<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reservas - Museo Otto Krause</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <style>
    :root {
      --red: #c8001a;
      --black: #0d0d0d;
      --white: #ffffff;
      --gray-100: #f5f5f5;
      --gray-200: #e5e5e5;
      --gray-700: #4b5563;
      --gray-800: #1f2937;
      --font-display: "Barlow Condensed", sans-serif;
      --font-body: "Barlow", sans-serif;
      --shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
      --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.14);
      --nav-h: 64px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: var(--white);
      color: var(--black);
      font-family: var(--font-body);
      line-height: 1.5;
    }

    button,
    input,
    select,
    textarea {
      font-family: inherit;
    }

    .reservas-main {
      padding-top: var(--nav-h);
      min-height: 100vh;
      background: var(--gray-100);
    }

    .reservas-page {
      min-height: 100vh;
      background: var(--gray-100);
      padding: 48px 0;
    }

    .reservas-shell {
      max-width: 720px;
      margin: 0 auto;
      padding: 0 24px;
    }

    .reservas-title {
      font-family: var(--font-display);
      font-size: 36px;
      font-weight: 900;
      text-transform: uppercase;
      color: var(--black);
      margin-bottom: 6px;
      letter-spacing: 0;
    }

    .reservas-sub {
      font-size: 14px;
      color: var(--gray-700);
      margin-bottom: 32px;
    }

    /* Estilos exactos del bloque de reserva (prototipo) */
    .tab-row {
      display: flex;
      gap: 4px;
      background: white;
      border-radius: 10px;
      padding: 4px;
      margin-bottom: 28px;
      width: 100%;
      box-shadow: var(--shadow);
      border: none;
      overflow: visible;
    }

    .tab-btn {
      flex: 1;
      font-family: var(--font-display);
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      padding: 10px;
      border-radius: 8px;
      cursor: pointer;
      color: var(--gray-700);
      transition: all 0.18s;
      background: transparent;
      border: none;
      box-shadow: none;
      line-height: 1;
      text-rendering: optimizeLegibility;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    .tab-btn.active {
      background: var(--red);
      color: white;
      border: none;
      box-shadow: none;
      font-family: var(--font-display);
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .form-card {
      background: white;
      border-radius: 16px;
      padding: 32px;
      box-shadow: var(--shadow);
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 16px;
    }

    .form-field {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .form-field.full {
      grid-column: 1 / -1;
    }

    .form-label {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--gray-700);
      line-height: 1.2;
    }

    .form-label span {
      color: var(--red);
    }

    .form-input,
    .form-select,
    .form-textarea {
      border: 1.5px solid var(--gray-200);
      border-radius: 8px;
      padding: 11px 14px;
      font-size: 14px;
      font-family: inherit;
      transition: border-color 0.18s;
      outline: none;
      background: white;
      color: var(--gray-800);
    }

    .form-input:focus,
    .form-select:focus,
    .form-textarea:focus {
      border-color: var(--red);
      background: white;
    }

    .form-input.err,
    .form-select.err {
      border-color: var(--red);
      background: rgba(200, 0, 26, 0.03);
    }

    .err-msg {
      font-size: 11px;
      color: var(--red);
      margin-top: 2px;
      min-height: 1.1em;
      line-height: 1.2;
    }

    .form-divider {
      border: none;
      border-top: 1px solid var(--gray-200);
      margin: 24px 0;
    }

    .btn-submit {
      width: 100%;
      background: var(--red);
      color: white;
      font-family: var(--font-display);
      font-size: 16px;
      font-weight: 800;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 14px;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.18s;
      margin-top: 8px;
    }

    .btn-submit:hover {
      background: #a80016;
    }

    .reserva-success {
      background: white;
      border-radius: 16px;
      padding: 48px;
      text-align: center;
      box-shadow: var(--shadow);
      display: none;
    }

    .reserva-success.visible {
      display: block;
    }

    .reserva-success-icon {
      width: 64px;
      height: 64px;
      background: rgba(34, 197, 94, 0.12);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
    }

    .reserva-success h2 {
      font-family: var(--font-display);
      font-size: 28px;
      font-weight: 900;
      text-transform: uppercase;
      margin-bottom: 10px;
      color: var(--black);
    }

    .reserva-success p {
      color: var(--gray-700);
      font-size: 14px;
      margin-bottom: 12px;
    }

    .reserva-success button {
      max-width: 240px;
      margin: 0 auto;
    }

    @media (max-width: 768px) {
      .form-row {
        grid-template-columns: 1fr;
      }

      .form-card {
        padding: 24px;
      }
    }
  </style>
</head>
<body>
  <header class="main-header">
    <div class="header-container">
      <a href="index.html" class="header-logo">
        <img src="public/unnamed.png" alt="Logo Museo Otto Krause">
        <span class="logo-text">MUSE<span class="logo-accent">OK</span></span>
      </a>
      <nav class="main-nav" aria-label="Navegación principal">
        <ul class="nav-list">
          <li><a href="index.html#inicio" class="nav-link">Inicio</a></li>
          <li><a href="index.html#info" class="nav-link">Información</a></li>
          <li><a href="reservas.html" class="nav-link active">Reservas</a></li>
          <li><a href="index.html#contacto" class="nav-link">Contacto</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main class="reservas-main">
    <section class="reservas-page">
      <div class="reservas-shell">
        <h1 class="reservas-title">Reservar visita</h1>
        <p class="reservas-sub">Completá el formulario según el tipo de visita</p>

        <div class="tab-row">
          <button type="button" class="tab-btn active" data-tab="personal">Personal</button>
          <button type="button" class="tab-btn" data-tab="escolar">Escolar</button>
          <button type="button" class="tab-btn" data-tab="institucional">Institucional</button>
        </div>

        <form class="form-card" id="reserva-form" novalidate>
          <div class="form-tab-group" data-tab-group="personal">
            <div class="form-row">
              <div class="form-field">
                <label class="form-label">Nombre <span>*</span></label>
                <input class="form-input" name="nombre" data-field="nombre" type="text" placeholder="Ej: Juan">
                <div class="err-msg" data-error="nombre"></div>
              </div>
              <div class="form-field">
                <label class="form-label">Apellido <span>*</span></label>
                <input class="form-input" name="apellido" data-field="apellido" type="text" placeholder="Ej: García">
                <div class="err-msg" data-error="apellido"></div>
              </div>
            </div>
            <div class="form-row">
              <div class="form-field">
                <label class="form-label">DNI <span>*</span></label>
                <input class="form-input" name="dni" data-field="dni" type="text" placeholder="Ej: 32456789">
                <div class="err-msg" data-error="dni"></div>
              </div>
              <div class="form-field">
                <label class="form-label">Email <span>*</span></label>
                <input class="form-input" name="email" data-field="email" type="email" placeholder="Ej: juan@gmail.com">
                <div class="err-msg" data-error="email"></div>
              </div>
            </div>
            <div class="form-row">
              <div class="form-field">
                <label class="form-label">Teléfono <span>*</span></label>
                <input class="form-input" name="tel" data-field="tel" type="text" placeholder="Ej: +54 11 4567-8901">
                <div class="err-msg" data-error="tel"></div>
              </div>
              <div class="form-field"></div>
            </div>
          </div>

          <div class="form-tab-group" data-tab-group="escolar" hidden>
            <div class="form-row">
              <div class="form-field">
                <label class="form-label">Nombre docente <span>*</span></label>
                <input class="form-input" name="docente_nombre" data-field="docente_nombre" type="text" placeholder="Ej: María">
                <div class="err-msg" data-error="docente_nombre"></div>
              </div>
              <div class="form-field">
                <label class="form-label">Apellido docente <span>*</span></label>
                <input class="form-input" name="docente_apellido" data-field="docente_apellido" type="text" placeholder="Ej: González">
                <div class="err-msg" data-error="docente_apellido"></div>
              </div>
            </div>
            <div class="form-row">
              <div class="form-field">
                <label class="form-label">Nombre de la institución <span>*</span></label>
                <input class="form-input" name="institucion" data-field="institucion" type="text" placeholder="Ej: Escuela N°15">
                <div class="err-msg" data-error="institucion"></div>
              </div>
              <div class="form-field">
                <label class="form-label">Código CUE <span>*</span></label>
                <input class="form-input" name="cue" data-field="cue" type="text" placeholder="Ej: 200000001">
                <div class="err-msg" data-error="cue"></div>
              </div>
            </div>
            <div class="form-row">
              <div class="form-field">
                <label class="form-label">Cantidad de alumnos <span>*</span></label>
                <input class="form-input" name="alumnos" data-field="alumnos" type="number" min="1" placeholder="Ej: 28">
                <div class="err-msg" data-error="alumnos"></div>
              </div>
              <div class="form-field">
                <label class="form-label">Docentes acompañantes <span>*</span></label>
                <input class="form-input" name="docentes" data-field="docentes" type="number" min="1" placeholder="Ej: 2">
                <div class="err-msg" data-error="docentes"></div>
              </div>
            </div>
            <div class="form-row">
              <div class="form-field">
                <label class="form-label">Email institucional <span>*</span></label>
                <input class="form-input" name="email_institucional" data-field="email_institucional" type="email" placeholder="Ej: escuela@edu.ar">
                <div class="err-msg" data-error="email_institucional"></div>
              </div>
              <div class="form-field">
                <label class="form-label">Teléfono <span>*</span></label>
                <input class="form-input" name="tel_institucional" data-field="tel_institucional" type="text" placeholder="Ej: +54 11 4567-8901">
                <div class="err-msg" data-error="tel_institucional"></div>
              </div>
            </div>
          </div>

          <div class="form-tab-group" data-tab-group="institucional" hidden>
            <div class="form-row">
              <div class="form-field">
                <label class="form-label">Nombre referente <span>*</span></label>
                <input class="form-input" name="referente_nombre" data-field="referente_nombre" type="text" placeholder="Ej: Laura">
                <div class="err-msg" data-error="referente_nombre"></div>
              </div>
              <div class="form-field">
                <label class="form-label">Apellido <span>*</span></label>
                <input class="form-input" name="referente_apellido" data-field="referente_apellido" type="text" placeholder="Ej: Pérez">
                <div class="err-msg" data-error="referente_apellido"></div>
              </div>
            </div>
            <div class="form-row">
              <div class="form-field">
                <label class="form-label">Organización / Empresa <span>*</span></label>
                <input class="form-input" name="organizacion" data-field="organizacion" type="text" placeholder="Ej: Grupo Tecnológico Sur">
                <div class="err-msg" data-error="organizacion"></div>
              </div>
              <div class="form-field">
                <label class="form-label">Cantidad de personas <span>*</span></label>
                <input class="form-input" name="personas" data-field="personas" type="number" min="1" placeholder="Ej: 20">
                <div class="err-msg" data-error="personas"></div>
              </div>
            </div>
            <div class="form-row">
              <div class="form-field">
                <label class="form-label">Email <span>*</span></label>
                <input class="form-input" name="email_institucional2" data-field="email_institucional2" type="email" placeholder="Ej: contacto@org.ar">
                <div class="err-msg" data-error="email_institucional2"></div>
              </div>
              <div class="form-field">
                <label class="form-label">Teléfono <span>*</span></label>
                <input class="form-input" name="tel_institucional2" data-field="tel_institucional2" type="text" placeholder="Ej: +54 11 4567-8901">
                <div class="err-msg" data-error="tel_institucional2"></div>
              </div>
            </div>
          </div>

          <hr class="form-divider">
          <div class="form-row">
            <div class="form-field">
              <label class="form-label">Fecha <span>*</span></label>
              <select class="form-select" id="fecha" name="fecha">
                <option value="">— Seleccioná una fecha —</option>
              </select>
              <div class="err-msg" data-error="fecha"></div>
            </div>
            <div class="form-field">
              <label class="form-label">Horario <span>*</span></label>
              <select class="form-select" id="horario" name="horario">
                <option value="">— Primero elegí una fecha —</option>
              </select>
              <div class="err-msg" data-error="horario"></div>
            </div>
          </div>

          <button type="submit" class="btn-submit">Enviar reserva</button>
        </form>

        <div class="reserva-success" id="success-panel">
          <div class="reserva-success-icon" id="success-icon"></div>
          <h2 id="success-title">¡Reserva enviada!</h2>
          <p id="success-text"></p>
          <button type="button" class="btn-submit" id="reset-btn">Nueva reserva</button>
        </div>
      </div>
    </section>
  </main>

  <script>
    const availability = {
      personal: [
        { date: '2026-07-01', times: ['09:00', '14:00'] },
        { date: '2026-07-03', times: ['09:00'] },
        { date: '2026-07-08', times: ['14:00'] }
      ],
      escolar: [
        { date: '2026-07-02', times: ['09:00', '14:00'] },
        { date: '2026-07-06', times: ['09:00'] },
        { date: '2026-07-10', times: ['14:00'] }
      ],
      institucional: [
        { date: '2026-07-04', times: ['09:00', '14:00'] },
        { date: '2026-07-09', times: ['09:00'] },
        { date: '2026-07-12', times: ['14:00'] }
      ]
    };

    const header = document.querySelector('.main-header');
    window.addEventListener('scroll', () => {
      header.classList.toggle('scrolled', window.scrollY > 40);
    });

    const tabButtons = document.querySelectorAll('.tab-btn');
    const tabGroups = document.querySelectorAll('.form-tab-group');
    const form = document.getElementById('reserva-form');
    const fechaSelect = document.getElementById('fecha');
    const horarioSelect = document.getElementById('horario');
    const successPanel = document.getElementById('success-panel');
    const successIcon = document.getElementById('success-icon');
    const successTitle = document.getElementById('success-title');
    const successText = document.getElementById('success-text');
    const resetBtn = document.getElementById('reset-btn');

    let currentTab = 'personal';

    function formatDate(dateStr) {
      const [y, m, d] = dateStr.split('-');
      return `${d}/${m}/${y}`;
    }

    function setTab(tab) {
      currentTab = tab;
      tabButtons.forEach(btn => btn.classList.toggle('active', btn.dataset.tab === tab));
      tabGroups.forEach(group => {
        group.hidden = group.dataset.tabGroup !== tab;
      });
      updateDateOptions();
      horarioSelect.innerHTML = '<option value="">— Primero elegí una fecha —</option>';
      form.reset();
      clearErrors();
    }

    function clearErrors() {
      document.querySelectorAll('[data-error]').forEach(el => el.textContent = '');
      document.querySelectorAll('.form-input, .form-select').forEach(el => el.classList.remove('err'));
    }

    function updateDateOptions() {
      const options = availability[currentTab];
      fechaSelect.innerHTML = '<option value="">— Seleccioná una fecha —</option>';
      options.forEach(item => {
        const option = document.createElement('option');
        option.value = item.date;
        option.textContent = `${formatDate(item.date)} (${item.times.join(' / ')})`;
        fechaSelect.appendChild(option);
      });
    }

    function getFieldValue(name) {
      const input = form.querySelector(`[name="${name}"]`);
      return input ? input.value.trim() : '';
    }

    function setError(field, message) {
      const errorEl = form.querySelector(`[data-error="${field}"]`);
      const inputEl = form.querySelector(`[name="${field}"]`);
      if (errorEl) errorEl.textContent = message;
      if (inputEl) inputEl.classList.add('err');
    }

    function validate() {
      clearErrors();
      let valid = true;
      const rules = {
        personal: ['nombre', 'apellido', 'dni', 'email', 'tel'],
        escolar: ['docente_nombre', 'docente_apellido', 'institucion', 'cue', 'alumnos', 'docentes', 'email_institucional', 'tel_institucional'],
        institucional: ['referente_nombre', 'referente_apellido', 'organizacion', 'personas', 'email_institucional2', 'tel_institucional2']
      };

      const fields = rules[currentTab];
      fields.forEach(field => {
        const value = getFieldValue(field);
        if (!value) {
          setError(field, 'Este campo es obligatorio.');
          valid = false;
        }
      });

      if (currentTab === 'personal') {
        const dni = getFieldValue('dni');
        if (dni && !/^\d{7,8}$/.test(dni)) {
          setError('dni', 'Ingresá un DNI válido.');
          valid = false;
        }
        const email = getFieldValue('email');
        if (email && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
          setError('email', 'Ingresá un email válido.');
          valid = false;
        }
      }

      if (currentTab === 'escolar') {
        const cue = getFieldValue('cue');
        if (cue && !/^\d{9}$/.test(cue)) {
          setError('cue', 'El CUE debe tener 9 dígitos.');
          valid = false;
        }
      }

      if (!fechaSelect.value) {
        setError('fecha', 'Seleccioná una fecha.');
        valid = false;
      }
      if (!horarioSelect.value) {
        setError('horario', 'Seleccioná un horario.');
        valid = false;
      }

      return valid;
    }

    fechaSelect.addEventListener('change', () => {
      const selected = availability[currentTab].find(item => item.date === fechaSelect.value);
      horarioSelect.innerHTML = '<option value="">— Seleccioná un horario —</option>';
      if (selected) {
        selected.times.forEach(time => {
          const option = document.createElement('option');
          option.value = time;
          option.textContent = `${time} hs`;
          horarioSelect.appendChild(option);
        });
      }
      clearErrors();
    });

    tabButtons.forEach(btn => {
      btn.addEventListener('click', () => setTab(btn.dataset.tab));
    });

    form.addEventListener('submit', (e) => {
      e.preventDefault();
      if (!validate()) return;

      const peopleCount = currentTab === 'institucional'
        ? Number(getFieldValue('personas') || 0)
        : currentTab === 'escolar'
          ? Number(getFieldValue('alumnos') || 0) + Number(getFieldValue('docentes') || 0)
          : 1;

      const pending = currentTab === 'institucional' && peopleCount > 30;
      successPanel.classList.add('visible');
      successPanel.scrollIntoView({ behavior: 'smooth', block: 'center' });
      successIcon.innerHTML = pending
        ? '<svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#f59e0b" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>'
        : '<svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#22c55e" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>';
      successIcon.style.background = pending ? 'rgba(245, 158, 11, 0.14)' : 'rgba(34, 197, 94, 0.12)';
      successTitle.textContent = pending ? '¡Reserva enviada!' : '¡Reserva confirmada!';
      successText.innerHTML = pending
        ? 'Tu solicitud fue recibida y quedó pendiente de revisión por el administrador.'
        : 'Tu reserva fue aprobada. Recibirás una confirmación por email.';
      form.style.display = 'none';
    });

    resetBtn.addEventListener('click', () => {
      successPanel.classList.remove('visible');
      form.style.display = 'block';
      setTab(currentTab);
    });

    setTab('personal');
  </script>
</body>
</html>
