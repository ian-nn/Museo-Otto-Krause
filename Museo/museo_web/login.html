<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - Museo Otto Krause</title>
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <div class="login-page">
      <div class="login-page-noise"></div>
      <div class="login-card">
        <div class="login-logo">
          <img src="public/unnamed.png" alt="Logo Museo Otto Krause" />
        </div>

        <div class="login-title">Panel administrativo</div>
        <div class="login-sub">museo tecnológico ingeniero Eduardo latzina</div>
        <div class="login-divider"></div>

        <div id="login-error" class="login-error" aria-live="polite" role="alert"></div>
        <div id="login-success" class="login-success" aria-live="polite" role="status"></div>

        <form id="login-form" novalidate>
          <div class="form-group">
            <label for="email" class="form-label">Usuario</label>
            <input
              id="email"
              name="email"
              class="form-input"
              type="text"
              placeholder="Nombre de usuario"
              autocomplete="username"
              required
            />
          </div>

          <div class="form-group">
            <label for="password" class="form-label">Contraseña</label>
            <input
              id="password"
              name="password"
              class="form-input"
              type="password"
              placeholder="••••••••"
              autocomplete="current-password"
              required
            />
          </div>

          <button type="submit" class="btn btn-primary btn-full login-submit">
            Ingresar al panel
          </button>
        </form>

        <div class="login-footer-hint">ACCESO RESTRINGIDO – PERSONAL AUTORIZADO</div>
      </div>
    </div>

    <script type="module" src="js/controllers/login.js"></script>
  </body>
</html>
