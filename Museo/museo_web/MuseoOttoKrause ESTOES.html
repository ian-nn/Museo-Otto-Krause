<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Museo Tecnológico «Ing. Eduardo Latzina» — Otto Krause</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root{
  --red:#c8001a; --black:#0d0d0d; --white:#ffffff;
  --gray-100:#f5f5f5; --gray-200:#e5e5e5; --gray-700:#4b5563; --gray-800:#1f2937;
  --font-display:"Barlow Condensed",sans-serif; --font-body:"Barlow",sans-serif;
  --shadow:0 2px 12px rgba(0,0,0,0.08); --shadow-lg:0 8px 32px rgba(0,0,0,0.14);
  --nav-h:64px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:var(--font-body);background:var(--white);color:var(--black);line-height:1.5}
button{cursor:pointer;border:none;background:none;font-family:inherit}
a{text-decoration:none;color:inherit}
input,select,textarea{font-family:inherit}

/* NAV */
.navbar{position:fixed;top:0;left:0;right:0;height:var(--nav-h);background:var(--black);z-index:100;border-bottom:2px solid var(--red)}
.nav-inner{max-width:1200px;margin:0 auto;padding:0 24px;height:100%;display:flex;align-items:center;justify-content:space-between}
.navbar-brand{display:flex;align-items:center;gap:12px;cursor:pointer}
.nav-logo{height:48px;width:auto;mix-blend-mode:screen}
.nav-brand-title{font-family:var(--font-display);font-size:18px;font-weight:800;color:white;letter-spacing:0.02em}
.nav-brand-sub{font-size:11px;color:rgba(255,255,255,0.4);letter-spacing:0.05em}
.nav-links{display:flex;align-items:center;gap:8px}
.nav-link{font-family:var(--font-display);font-size:15px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;color:rgba(255,255,255,0.55);padding:8px 16px;border-radius:6px;cursor:pointer;transition:all .18s}
.nav-link:hover,.nav-link.active{color:white}
.nav-link.active{background:rgba(200,0,26,0.18);color:var(--red)}
.nav-reservar{background:var(--red);color:white;font-family:var(--font-display);font-size:14px;font-weight:800;letter-spacing:0.06em;text-transform:uppercase;padding:9px 20px;border-radius:6px;cursor:pointer;transition:background .18s}
.nav-reservar:hover{background:#a80016}
.btn-logout{font-family:var(--font-display);font-size:13px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;color:rgba(255,255,255,0.45);padding:8px 14px;border-radius:6px;cursor:pointer;transition:all .18s}
.btn-logout:hover{color:white;background:rgba(255,255,255,0.08)}

/* PAGE WRAPPER */
.page{padding-top:var(--nav-h)}

/* HERO */
.hero{position:relative;height:92vh;min-height:560px;background:linear-gradient(160deg,#1a0005 0%,#2d0008 45%,#0d0d0d 100%);display:flex;align-items:flex-end;overflow:hidden}
.hero-bg{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;opacity:.06;font-family:var(--font-display);font-size:clamp(160px,22vw,320px);font-weight:900;color:var(--red);letter-spacing:-0.05em;user-select:none;pointer-events:none}
.hero-inner{position:relative;z-index:1;max-width:1200px;margin:0 auto;padding:0 48px 72px}
.hero-eyebrow{display:inline-flex;align-items:center;gap:10px;font-family:var(--font-display);font-size:11px;font-weight:800;letter-spacing:.2em;text-transform:uppercase;color:var(--red);margin-bottom:20px}
.hero-line{display:block;width:32px;height:2px;background:var(--red)}
.hero-title{font-family:var(--font-display);font-size:clamp(48px,8vw,96px);font-weight:900;text-transform:uppercase;letter-spacing:-.01em;line-height:.92;color:white;margin-bottom:32px}
.hero-title span{color:var(--red)}
.hero-meta{display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.hero-meta-item{display:flex;align-items:center;gap:6px;font-size:13px;color:rgba(255,255,255,.55);font-weight:600}
.hero-meta-item svg{color:var(--red)}
.hero-meta-sep{color:rgba(255,255,255,.15)}
.hero-cta{margin-top:32px}
.btn-hero{background:var(--red);color:white;font-family:var(--font-display);font-size:16px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;padding:14px 36px;border-radius:8px;cursor:pointer;transition:all .18s;display:inline-block}
.btn-hero:hover{background:#a80016;transform:translateY(-1px)}

/* SECTIONS */
.section-white{background:var(--white);padding:80px 0}
.section-dark{background:var(--black);padding:80px 0}
.section-inner{max-width:1200px;margin:0 auto;padding:0 48px}
.section-eyebrow{display:inline-flex;align-items:center;gap:8px;color:var(--red);font-family:var(--font-display);font-size:11px;font-weight:800;letter-spacing:.18em;text-transform:uppercase;margin-bottom:18px}
.section-eyebrow-line{display:block;width:24px;height:2px;background:var(--red)}
.home-section-title{font-family:var(--font-display);font-size:13px;font-weight:800;letter-spacing:.18em;text-transform:uppercase;color:rgba(255,255,255,.4);margin-bottom:10px}
.home-section-sub{color:rgba(255,255,255,.35);font-size:14px}

/* ABOUT 2-COL */
.about-grid{display:grid;grid-template-columns:1fr 400px;gap:64px;align-items:flex-start}
.about-left-text{color:var(--gray-700);font-size:15px;line-height:1.9}
.about-left-text p{margin-bottom:18px}
.about-right{display:flex;flex-direction:column;gap:16px;position:sticky;top:84px}
.stat-card{background:var(--black);border-radius:20px;padding:36px 32px;overflow:hidden;position:relative}
.stat-card-watermark{position:absolute;bottom:-20px;right:-10px;font-family:var(--font-display);font-size:140px;font-weight:900;color:rgba(200,0,26,0.07);line-height:1;pointer-events:none;user-select:none;letter-spacing:-0.04em}
.stat-card-label{font-family:var(--font-display);font-size:11px;font-weight:800;letter-spacing:.18em;text-transform:uppercase;color:rgba(255,255,255,.3);margin-bottom:8px}
.stat-card-num{font-family:var(--font-display);font-size:80px;font-weight:900;color:var(--red);line-height:.9;letter-spacing:-.03em}
.stat-card-desc{color:rgba(255,255,255,.4);font-size:13px;margin-top:14px;line-height:1.6;max-width:260px}
.stat-card-mini{display:flex;gap:20px;margin-top:22px;padding-top:20px;border-top:1px solid rgba(255,255,255,.08)}
.stat-mini-item{text-align:center}
.stat-mini-num{font-family:var(--font-display);font-size:26px;font-weight:900;color:white}
.stat-mini-num sup{font-size:.5em;color:var(--red)}
.stat-mini-lbl{font-size:10px;color:rgba(255,255,255,.35);text-transform:uppercase;letter-spacing:.08em;margin-top:2px}
.stat-mini-sep{width:1px;background:rgba(255,255,255,.08)}
.cat-card{background:var(--gray-100);border-radius:20px;padding:28px 26px}
.cat-card-title{font-family:var(--font-display);font-size:11px;font-weight:800;letter-spacing:.18em;text-transform:uppercase;color:var(--gray-700);margin-bottom:18px}
.cat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.cat-tile{background:white;border-radius:12px;padding:14px;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.cat-tile-name{font-family:var(--font-display);font-size:14px;font-weight:800;color:var(--black);letter-spacing:.02em}
.cat-tile-desc{font-size:11px;color:var(--gray-700);margin-top:3px}

/* PATRIMONIO HISTÓRICO */
.patrimonio-section{background:radial-gradient(ellipse at top, #2a0a10 0%, var(--black) 55%);padding:56px 0 72px}
.patrimonio-inner{max-width:1200px;margin:0 auto;padding:0 48px}
.patrimonio-statsbar{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:30px 40px;display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin-bottom:56px}
.patrimonio-stat{text-align:center;border-right:1px solid rgba(255,255,255,.08)}
.patrimonio-stat:last-child{border-right:none}
.patrimonio-stat-num{font-family:var(--font-display);font-size:36px;font-weight:900;color:var(--red);letter-spacing:-.01em}
.patrimonio-stat-lbl{font-family:var(--font-display);font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.55);margin-top:4px}
.patrimonio-grid{display:grid;grid-template-columns:1fr 1fr;gap:56px;align-items:center;margin-bottom:48px}
.patrimonio-eyebrow{font-family:var(--font-display);font-size:12px;font-weight:800;letter-spacing:.16em;text-transform:uppercase;color:var(--red);margin-bottom:10px}
.patrimonio-title{font-family:var(--font-display);font-size:34px;font-weight:900;text-transform:uppercase;color:white;letter-spacing:.01em;margin-bottom:8px;position:relative;padding-bottom:14px}
.patrimonio-title::after{content:"";position:absolute;left:0;bottom:0;width:54px;height:3px;background:var(--red)}
.patrimonio-text{color:rgba(255,255,255,.72);font-size:14px;line-height:1.85;margin-top:22px}
.patrimonio-text p{margin-bottom:14px}
.patrimonio-img{width:100%;height:340px;object-fit:cover;border-radius:10px;box-shadow:0 12px 32px rgba(0,0,0,.4)}
.patrimonio-cards{display:grid;grid-template-columns:repeat(4,1fr);gap:18px;margin-bottom:32px}
.patrimonio-card{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:22px 20px}
.patrimonio-card-icon{width:30px;height:30px;margin-bottom:14px}
.patrimonio-card-title{font-family:var(--font-display);font-size:13px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;color:white;margin-bottom:8px}
.patrimonio-card-desc{font-size:12.5px;color:rgba(255,255,255,.55);line-height:1.6}
.patrimonio-timeline-box{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:26px 36px 30px;margin-bottom:48px}
.patrimonio-timeline-title{font-family:var(--font-display);font-size:12px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:var(--red);margin-bottom:22px}
.patrimonio-timeline{display:grid;grid-template-columns:repeat(4,1fr);position:relative}
.patrimonio-timeline::before{content:"";position:absolute;top:6px;left:6%;right:6%;height:2px;background:rgba(200,0,26,.35)}
.patrimonio-tl-item{text-align:center;position:relative}
.patrimonio-tl-dot{width:13px;height:13px;border-radius:50%;background:var(--red);border:2px solid var(--black);margin:0 auto 16px;position:relative;z-index:1}
.patrimonio-tl-year{font-family:var(--font-display);font-size:19px;font-weight:900;color:var(--red);margin-bottom:6px}
.patrimonio-tl-desc{font-size:12px;color:rgba(255,255,255,.6);line-height:1.55;max-width:200px;margin:0 auto}
.patrimonio-coll-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.patrimonio-coll-title{font-family:var(--font-display);font-size:22px;font-weight:900;text-transform:uppercase;color:white}
.patrimonio-coll-link{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--red);color:var(--red);font-family:var(--font-display);font-size:11px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;padding:9px 16px;border-radius:7px;background:transparent;transition:all .15s}
.patrimonio-coll-link:hover{background:var(--red);color:white}
.patrimonio-carousel-wrap{position:relative}
.patrimonio-carousel{display:grid;grid-template-columns:repeat(5,1fr);gap:18px;overflow:hidden}
.patrimonio-coll-card{border-radius:10px;overflow:hidden;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08)}
.patrimonio-coll-imgbox{width:100%;aspect-ratio:1/1;background:rgba(255,255,255,.05);display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,.18)}
.patrimonio-coll-imgbox img{width:100%;height:100%;object-fit:cover;display:block}
.patrimonio-coll-info{padding:12px 14px 16px}
.patrimonio-coll-name{font-family:var(--font-display);font-size:13px;font-weight:800;letter-spacing:.02em;text-transform:uppercase;color:white}
.patrimonio-coll-period{font-size:11px;color:rgba(255,255,255,.5);margin-top:2px}
.patrimonio-carousel-nav{width:38px;height:38px;border-radius:50%;border:1.5px solid rgba(255,255,255,.25);background:rgba(0,0,0,.5);color:white;display:flex;align-items:center;justify-content:center;position:absolute;top:50%;transform:translateY(-50%);transition:all .15s}
.patrimonio-carousel-nav:hover{border-color:var(--red);background:var(--red)}
.patrimonio-carousel-nav.prev{left:-19px}
.patrimonio-carousel-nav.next{right:-19px}
@media(max-width:1024px){
  .patrimonio-grid{grid-template-columns:1fr}
  .patrimonio-cards{grid-template-columns:repeat(2,1fr)}
  .patrimonio-timeline{grid-template-columns:repeat(2,1fr);row-gap:28px}
  .patrimonio-timeline::before{display:none}
  .patrimonio-carousel{grid-template-columns:repeat(2,1fr)}
  .patrimonio-statsbar{grid-template-columns:1fr}
  .patrimonio-stat{border-right:none;border-bottom:1px solid rgba(255,255,255,.08);padding-bottom:14px}
  .patrimonio-stat:last-child{border-bottom:none;padding-bottom:0}
}


/* VISIT CARDS */
.visit-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:24px}
.visit-card{background:rgba(255,255,255,.09);border:1px solid rgba(255,255,255,.16);border-radius:16px;padding:32px 28px;transition:all .2s;border-top:3px solid rgba(200,0,26,.55)}
.visit-card:hover{background:rgba(200,0,26,.14);border-color:rgba(200,0,26,.5);transform:translateY(-4px)}
.visit-card-icon{width:52px;height:52px;background:rgba(200,0,26,.12);border-radius:12px;display:flex;align-items:center;justify-content:center;margin-bottom:20px}
.visit-card-title{font-family:var(--font-display);font-size:22px;font-weight:800;text-transform:uppercase;color:white;margin-bottom:10px}
.visit-card-desc{font-size:13px;color:rgba(255,255,255,.55);line-height:1.7;margin-bottom:20px}
.visit-card-detail{display:flex;flex-wrap:wrap;gap:6px}
.visit-card-chip{font-size:11px;font-weight:700;color:rgba(255,255,255,.6);background:rgba(255,255,255,.08);padding:4px 10px;border-radius:4px}
.home-reservar-wrap{text-align:center;margin-top:48px}

/* CONTACT STRIP */
.contact-strip{background:var(--red);padding:24px 0}
.contact-strip-inner{max-width:1200px;margin:0 auto;padding:0 48px;display:flex;align-items:center;justify-content:space-between;gap:24px}
.contact-strip-text{font-family:var(--font-display);font-size:18px;font-weight:700;color:white;letter-spacing:.02em}
.contact-strip-sub{font-size:13px;color:rgba(255,255,255,.7);margin-top:2px}
.contact-strip-info{display:flex;gap:32px;align-items:center}
.contact-item{display:flex;align-items:center;gap:8px;color:white;font-size:13px;font-weight:600}

/* FOOTER */
.footer{background:#050505;padding:24px 0}
.footer-inner{max-width:1200px;margin:0 auto;padding:0 48px;display:flex;align-items:center;justify-content:space-between}
.footer-copy{font-size:12px;color:rgba(255,255,255,.2)}
.footer-admin-link{font-size:11px;color:rgba(255,255,255,.08);cursor:pointer;transition:color .2s}
.footer-admin-link:hover{color:rgba(255,255,255,.3)}

/* RESERVAS PAGE */
.reservas-page{min-height:100vh;background:var(--gray-100);padding:48px 0}
.reservas-inner{max-width:720px;margin:0 auto;padding:0 24px}
.reservas-title{font-family:var(--font-display);font-size:36px;font-weight:900;text-transform:uppercase;color:var(--black);margin-bottom:6px}
.reservas-sub{font-size:14px;color:var(--gray-700);margin-bottom:32px}
.tab-row{display:flex;gap:4px;background:white;border-radius:10px;padding:4px;margin-bottom:28px;box-shadow:var(--shadow)}
.tab-btn{flex:1;font-family:var(--font-display);font-size:15px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;padding:10px;border-radius:8px;cursor:pointer;color:var(--gray-700);transition:all .18s}
.tab-btn.active{background:var(--red);color:white}
.form-card{background:white;border-radius:16px;padding:32px;box-shadow:var(--shadow)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
.form-field{display:flex;flex-direction:column;gap:5px}
.form-field.full{grid-column:1/-1}
.form-label{font-size:12px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--gray-700)}
.form-label span{color:var(--red)}
.form-input{border:1.5px solid var(--gray-200);border-radius:8px;padding:11px 14px;font-size:14px;font-family:inherit;transition:border-color .18s;outline:none}
.form-input:focus{border-color:var(--red)}
.form-input.err{border-color:var(--red);background:rgba(200,0,26,.03)}
.form-select{border:1.5px solid var(--gray-200);border-radius:8px;padding:11px 14px;font-size:14px;font-family:inherit;background:white;cursor:pointer;outline:none}
.form-select.err{border-color:var(--red)}
.form-textarea{border:1.5px solid var(--gray-200);border-radius:8px;padding:11px 14px;font-size:14px;font-family:inherit;resize:vertical;min-height:80px;outline:none}
.err-msg{font-size:11px;color:var(--red);margin-top:2px}
.form-divider{border:none;border-top:1px solid var(--gray-200);margin:24px 0}
.btn-submit{width:100%;background:var(--red);color:white;font-family:var(--font-display);font-size:16px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;padding:14px;border-radius:8px;cursor:pointer;transition:background .18s;margin-top:8px}
.btn-submit:hover{background:#a80016}
.reserva-success{background:white;border-radius:16px;padding:48px;text-align:center;box-shadow:var(--shadow)}
.reserva-success-icon{width:64px;height:64px;background:rgba(34,197,94,.12);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 20px}

/* LOGIN PAGE */
.login-page{height:100vh;overflow:hidden;background:linear-gradient(160deg,#0d0005 0%,#1e0008 40%,#080808 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0;position:relative}
.login-bg-text{position:absolute;font-family:var(--font-display);font-size:280px;font-weight:900;color:rgba(200,0,26,.04);pointer-events:none;user-select:none;letter-spacing:-.05em;top:50%;left:50%;transform:translate(-50%,-50%)}
.login-logo-wrap{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;margin-bottom:28px}
.login-logo-wrap img{height:100px;width:auto;mix-blend-mode:screen;filter:brightness(1.05)}
.login-logo-name{font-family:var(--font-display);font-size:13px;font-weight:800;letter-spacing:.22em;text-transform:uppercase;color:rgba(255,255,255,.3);margin-top:10px}
.login-card{background:rgba(255,255,255,.04);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.08);border-radius:20px;padding:36px 40px;width:100%;max-width:400px;position:relative;z-index:1}
.login-title{font-family:var(--font-display);font-size:22px;font-weight:900;text-transform:uppercase;color:white;text-align:center;margin-bottom:4px}
.login-sub{font-size:13px;color:rgba(255,255,255,.35);text-align:center;margin-bottom:28px}
.login-field{margin-bottom:16px}
.login-label{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:rgba(255,255,255,.4);display:block;margin-bottom:6px}
.login-input{width:100%;border:1.5px solid rgba(255,255,255,.1);border-radius:8px;padding:12px 16px;font-size:14px;font-family:inherit;outline:none;transition:border-color .18s;background:rgba(255,255,255,.06);color:white}
.login-input::placeholder{color:rgba(255,255,255,.2)}
.login-input:focus{border-color:var(--red);background:rgba(255,255,255,.08)}
.login-err{background:rgba(200,0,26,.15);border:1px solid rgba(200,0,26,.4);border-radius:8px;padding:10px 14px;font-size:13px;color:#ff6b7a;margin-bottom:14px}
.btn-login{width:100%;background:var(--red);color:white;font-family:var(--font-display);font-size:16px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;padding:13px;border-radius:8px;cursor:pointer;transition:background .18s}
.btn-login:hover{background:#a80016}

/* ADMIN LAYOUT */
.admin-layout{display:grid;grid-template-columns:240px 1fr;min-height:calc(100vh - var(--nav-h))}
.admin-sidebar{background:var(--black);border-right:1px solid rgba(255,255,255,.06);padding:24px 0}
.admin-sidebar-logo{padding:0 20px 24px;border-bottom:1px solid rgba(255,255,255,.06);margin-bottom:16px}
.admin-sidebar-label{font-size:10px;font-weight:800;letter-spacing:.14em;text-transform:uppercase;color:rgba(255,255,255,.25);padding:0 20px;margin-bottom:8px}
.sidebar-item{display:flex;align-items:center;gap:10px;padding:11px 20px;font-family:var(--font-display);font-size:15px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:rgba(255,255,255,.45);cursor:pointer;transition:all .18s;border-left:3px solid transparent}
.sidebar-item:hover{color:white;background:rgba(255,255,255,.04)}
.sidebar-item.active{color:white;background:rgba(200,0,26,.12);border-left-color:var(--red)}
.admin-content{background:var(--gray-100);padding:32px}

/* ADMIN DASHBOARD */
.dash-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:32px}
.dash-card{background:white;border-radius:12px;padding:20px;box-shadow:var(--shadow);border-left:4px solid var(--red)}
.dash-card-num{font-family:var(--font-display);font-size:36px;font-weight:900;color:var(--red);line-height:1}
.dash-card-label{font-size:12px;color:var(--gray-700);margin-top:6px;font-weight:600}
.admin-table-wrap{background:white;border-radius:12px;padding:24px;box-shadow:var(--shadow)}
.admin-table-title{font-family:var(--font-display);font-size:18px;font-weight:800;text-transform:uppercase;color:var(--black);margin-bottom:16px}
.table{width:100%;border-collapse:collapse;font-size:13px}
.table th{text-align:left;font-size:10px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--gray-700);padding:10px 14px;border-bottom:2px solid var(--gray-200)}
.table td{padding:12px 14px;border-bottom:1px solid var(--gray-200);vertical-align:middle}
.table tr:last-child td{border-bottom:none}
.badge{display:inline-block;font-size:11px;font-weight:700;padding:3px 8px;border-radius:4px}
.badge-green{background:rgba(34,197,94,.12);color:#166534}
.badge-yellow{background:rgba(234,179,8,.12);color:#854d0e}
.badge-red{background:rgba(200,0,26,.1);color:var(--red)}
.badge-gray{background:rgba(107,114,128,.1);color:#374151}

/* ADMIN RESERVAS */
.rv-bar{display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap}
.rv-search{flex:1;min-width:200px;border:1.5px solid var(--gray-200);border-radius:8px;padding:9px 14px;font-size:13px;font-family:inherit;outline:none}
.rv-select{border:1.5px solid var(--gray-200);border-radius:8px;padding:9px 14px;font-size:13px;font-family:inherit;background:white;cursor:pointer;outline:none}
.btn-sm{font-family:var(--font-display);font-size:12px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;padding:7px 14px;border-radius:6px;cursor:pointer;transition:all .18s}
.btn-primary{background:var(--red);color:white}
.btn-primary:hover{background:#a80016}
.btn-secondary{background:white;color:var(--gray-700);border:1.5px solid var(--gray-200)}
.btn-secondary:hover{border-color:var(--gray-700);color:var(--black)}
.btn-icon{width:30px;height:30px;border-radius:6px;display:inline-flex;align-items:center;justify-content:center;cursor:pointer;transition:all .18s}
.btn-approve{background:rgba(34,197,94,.1);color:#166534}
.btn-approve:hover{background:rgba(34,197,94,.2)}
.btn-reject{background:rgba(200,0,26,.1);color:var(--red)}
.btn-reject:hover{background:rgba(200,0,26,.2)}
.btn-view{background:var(--gray-100);color:var(--gray-700)}
.btn-view:hover{background:var(--gray-200)}

/* INVENTARIO */
.inv-toolbar{display:flex;gap:10px;align-items:center;margin-bottom:20px;flex-wrap:wrap}
.inv-search{flex:1;min-width:200px;border:1.5px solid var(--gray-200);border-radius:8px;padding:9px 14px;font-size:13px;font-family:inherit;outline:none;background:white}
.inv-filter-select{border:1.5px solid var(--gray-200);border-radius:8px;padding:9px 14px;font-size:13px;font-family:inherit;background:white;cursor:pointer;outline:none}
.inv-view-toggle{display:flex;gap:4px;background:white;border-radius:8px;padding:3px;border:1.5px solid var(--gray-200)}
.inv-view-btn{width:32px;height:32px;border-radius:6px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--gray-700);transition:all .18s}
.inv-view-btn.active{background:var(--red);color:white}
.inv-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px}
.inv-card{border-radius:12px;overflow:hidden;box-shadow:var(--shadow);border:1px solid var(--gray-200);background:var(--red);cursor:pointer;display:flex;flex-direction:column;transition:all .18s}
.inv-card:hover{transform:translateY(-3px);box-shadow:var(--shadow-lg);border-color:rgba(200,0,26,.6)}
.inv-card-img{height:150px;flex-shrink:0;background:linear-gradient(135deg,#f0e8e8,#e0d0d0);display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
.inv-card-initials{font-family:var(--font-display);font-size:48px;font-weight:900;color:rgba(200,0,26,.15);text-transform:uppercase;letter-spacing:-2px}
.inv-card-code-badge{position:absolute;top:10px;left:10px;z-index:2;background:rgba(0,0,0,.65);color:white;font-size:10px;font-weight:700;padding:3px 8px;border-radius:4px;letter-spacing:.05em;font-family:var(--font-display)}
.inv-card-estado-dot{position:absolute;top:10px;right:10px;z-index:2;width:10px;height:10px;border-radius:999px;border:2px solid white}
.inv-card-bottom{background:var(--red);padding:14px 16px;flex:1;display:flex;flex-direction:column}
.inv-card-name{font-family:var(--font-display);font-size:16px;font-weight:800;color:white;margin-bottom:4px;line-height:1.15;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.inv-card-sub{font-size:11px;color:rgba(255,255,255,.75);margin-bottom:10px;line-height:1.45;height:2.9em;overflow:hidden}
.inv-card-chips{display:flex;gap:5px;flex-wrap:wrap;margin-top:auto}
.inv-chip{font-size:10px;font-weight:700;color:white;padding:2px 7px;border-radius:3px;letter-spacing:.04em}

/* INV LIST VIEW */
.inv-list{background:white;border-radius:12px;box-shadow:var(--shadow);overflow:hidden}
.inv-list-head{display:grid;grid-template-columns:2fr 1fr 1fr 1fr 1fr 80px;gap:0;background:var(--gray-100);padding:10px 16px;font-size:10px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--gray-700);border-bottom:2px solid var(--gray-200)}
.inv-list-row{display:grid;grid-template-columns:2fr 1fr 1fr 1fr 1fr 80px;gap:0;padding:12px 16px;border-bottom:1px solid var(--gray-200);font-size:13px;align-items:center;cursor:pointer;transition:background .15s}
.inv-list-row:hover{background:rgba(200,0,26,.03)}
.inv-list-row:last-child{border-bottom:none}
.inv-list-name{font-weight:700;color:var(--black)}
.inv-list-sub{font-size:11px;color:var(--gray-700);margin-top:1px}

/* PAGINATION */
.pag{display:flex;align-items:center;justify-content:center;gap:6px;margin-top:20px}
.pag-btn{width:34px;height:34px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;cursor:pointer;border:1.5px solid var(--gray-200);background:white;color:var(--gray-700);transition:all .18s}
.pag-btn:hover{border-color:var(--red);color:var(--red)}
.pag-btn.active{background:var(--red);color:white;border-color:var(--red)}
.pag-btn:disabled{opacity:.4;cursor:default}
.inv-count{font-size:12px;color:var(--gray-700);margin-bottom:10px}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(3px)}
.modal{background:white;border-radius:20px;padding:32px;width:100%;max-width:660px;max-height:90vh;overflow-y:auto;position:relative}
.modal-hdr{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:20px}
.modal-title{font-family:var(--font-display);font-size:22px;font-weight:900;text-transform:uppercase;color:var(--black)}
.modal-close{width:32px;height:32px;border-radius:6px;background:var(--gray-100);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:20px;line-height:1;color:var(--gray-700);flex-shrink:0}
.modal-close:hover{background:var(--gray-200)}
.modal-chips{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px}
.modal-section{background:var(--gray-100);border-radius:10px;padding:16px 18px;margin-bottom:14px}
.modal-section-title{font-size:10px;font-weight:900;letter-spacing:.16em;text-transform:uppercase;color:var(--red);margin-bottom:12px}
.modal-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.modal-field-label{font-size:10px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:var(--red)}
.modal-field-val{font-size:14px;font-weight:700;color:var(--black);margin-top:2px}
.modal-desc{font-size:14px;color:var(--gray-800);line-height:1.7;background:var(--gray-100);border-radius:8px;padding:14px 16px;margin-bottom:14px}
.modal-danger{background:rgba(200,0,26,.05);border:1px solid rgba(200,0,26,.18);border-radius:10px;padding:14px;margin-top:4px}
.modal-danger p{font-size:13px;color:var(--gray-700);margin-bottom:12px}
.modal-danger-btns{display:flex;gap:10px;justify-content:flex-end}

/* ADD OBJ FORM */
.obj-section-title{font-family:var(--font-display);font-size:11px;font-weight:800;letter-spacing:.14em;text-transform:uppercase;color:var(--red);margin:20px 0 12px;border-bottom:2px solid rgba(200,0,26,.12);padding-bottom:6px}
.obj-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:12px}
.obj-field{display:flex;flex-direction:column;gap:4px}
.obj-label{font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--gray-700)}
.obj-label span{color:var(--red)}
.obj-input{border:1.5px solid var(--gray-200);border-radius:8px;padding:9px 12px;font-size:13px;font-family:inherit;outline:none;transition:border-color .18s}
.obj-input:focus{border-color:var(--red)}
.obj-input.err{border-color:var(--red);background:rgba(200,0,26,.03)}
.obj-select{border:1.5px solid var(--gray-200);border-radius:8px;padding:9px 12px;font-size:13px;font-family:inherit;background:white;cursor:pointer;outline:none}
.obj-select.err{border-color:var(--red)}
.obj-err-msg{font-size:11px;color:var(--red);margin-top:2px}

/* XLSX MODAL */
.xlsx-table-wrap{max-height:360px;overflow:auto;border:1px solid var(--gray-200);border-radius:8px;margin-top:14px}
.xlsx-table{width:max-content;min-width:100%;border-collapse:collapse;font-size:12px}
.xlsx-table th{background:var(--gray-100);padding:8px 10px;text-align:left;font-size:10px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:var(--gray-700);position:sticky;top:0;border-bottom:1px solid var(--gray-200)}
.xlsx-table td{padding:8px 10px;border-bottom:1px solid var(--gray-200);white-space:nowrap;max-width:200px;overflow:hidden;text-overflow:ellipsis}
.xlsx-table tr:last-child td{border-bottom:none}
.xlsx-table tr.selected td{background:rgba(200,0,26,.04)}
.xlsx-sel-count{font-size:12px;color:var(--gray-700);margin-top:10px}

/* TOAST */
.toast{position:fixed;bottom:24px;right:24px;z-index:999;background:var(--black);color:white;padding:14px 20px;border-radius:12px;font-size:14px;font-weight:600;box-shadow:0 8px 32px rgba(0,0,0,.3);display:flex;align-items:center;gap:10px;animation:toastIn .3s ease;border-left:4px solid var(--red)}
@keyframes toastIn{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
.toast-icon{width:20px;height:20px;background:var(--red);border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.btn-edit{background:var(--black);color:white;display:inline-flex;align-items:center;gap:6px}
.btn-edit:hover{background:#222}

/* RESPONSIVE */
@media(max-width:980px){
  .about-grid,.visit-cards,.dash-grid{grid-template-columns:1fr}
  .admin-layout{grid-template-columns:1fr}
  .admin-sidebar{display:none}
  .form-row,.obj-row{grid-template-columns:1fr}
}
@media(max-width:640px){
  .section-inner,.contact-strip-inner,.footer-inner{padding:0 20px}
  .hero-inner{padding:0 24px 48px}
  .inv-list-head,.inv-list-row{grid-template-columns:2fr 1fr 80px}
}
</style>

// Normaliza acentos para búsqueda sin tilde
function personalCountForFecha(fecha) {
  return S.reservas.filter(r => r.tipo==='personal' && r.fecha===fecha && r.estado!=='rechazada').length;
}

function getMaxCupo(fecha) {
  const d = S.fechasDisp.find(d=>d.fecha===fecha);
  return d?.cupo || MAX_PERSONAL_PER_FECHA;
}
// Alias retrocompatible
function getMaxPersonal(fecha) { return getMaxCupo(fecha); }

function reservasCountForFecha(fecha, tipo) {
  return S.reservas.filter(r => r.fecha===fecha && r.tipo===tipo && r.estado!=='rechazada').length;
}

// Cantidad real de personas que ocupan el cupo de esa fecha, según el tipo:
// personal → titular + acompañantes · escolar → estudiantes + docentes · institucional → personas
function personasCountForFecha(fecha, tipo) {
  return S.reservas
    .filter(r => r.fecha===fecha && r.tipo===tipo && r.estado!=='rechazada')
    .reduce((sum,r) => {
      if (tipo === 'escolar') return sum + (parseInt(r.estudiantes)||0) + (parseInt(r.docentes)||0);
      if (tipo === 'institucional') return sum + (parseInt(r.personas)||0);
      return sum + (r.personas || 1); // personal: titular (+ acompañantes)
    }, 0);
}

// Cuántas personas pediría ESTA reserva en particular (antes de guardarla)
function personasRequestedFor(tipo, f, integrantes) {
  if (tipo === 'personal') return 1 + (integrantes ? integrantes.filter(p=>(p.nombre||'').trim()).length : 0);
  if (tipo === 'escolar') return (parseInt(f.estudiantes)||0) + (parseInt(f.docentes)||0);
  return parseInt(f.personas)||0;
}

function nrm(s) {
  return (s||'').normalize('NFD').replace(/[̀-ͯ]/g,'').toLowerCase();
}

function abbrev(s) {
  if (!s) return '';
  return s.split(' ').map(w=>w[0]).join('').slice(0,3).toUpperCase();
}

function chipColor(cat) {
  const m = {Agricultura:'#854d0e',Imprenta:'#3a1a6b',Instrumental:'#1a3a6b',
              Mecánica:'#b91c1c',Modelismo:'#1a6b3a',Textiles:'#6b3a1a',
              Científica:'#0e4d6b',Histórica:'#6b4d0e',Industrial:'#4d0e0e',Técnica:'#0e6b4d'};
  return m[cat]||'#374151';
}

function estadoColor(e) {
  if (e==='Bueno') return '#22c55e';
  if (e==='Regular') return '#f59e0b';
  return '#ef4444';
}

function badgeClass(estado) {
  return {aprobada:'badge-green',pendiente:'badge-yellow',rechazada:'badge-red'}[estado]||'badge-gray';
}

function badgeLabel(estado) {
  return {aprobada:'Aprobada',pendiente:'Pendiente',rechazada:'Rechazada'}[estado]||estado;
}

function fmtDate(d) {
  if (!d) return '—';
  const [y,m,day] = d.split('-');
  return `${day}/${m}/${y}`;
}

function showToast(msg) {
  if (S.toastTimer) clearTimeout(S.toastTimer);
  S.toast = msg;
  renderToastEl();
  S.toastTimer = setTimeout(()=>{ S.toast=null; renderToastEl(); }, 3500);
}

// setState parcial y re-render completo
function setState(partial) {
  Object.assign(S, partial);
  render();
}

function navigate(route) {
  window.location.hash = route;
  S.route = route;
  S.rvOk = false;
  render();
}

// Sincroniza TODOS los campos del formulario de reserva (incluida la lista de
// integrantes) desde el DOM hacia el estado, para no perder datos al agregar/
// quitar filas o cambiar de fecha — sin esto, el re-render borraba lo ya escrito.
function syncRvFormFromDOM() {
  document.querySelectorAll('[data-rv-field]').forEach(el => {
    S.rvForm[el.dataset.rvField] = el.value;
  });
  document.querySelectorAll('.integrante-row').forEach(row => {
    const idx = parseInt(row.dataset.idx);
    if (!S.rvIntegrantes[idx]) S.rvIntegrantes[idx] = {};
    row.querySelectorAll('.integrante-field').forEach(inp => {
      S.rvIntegrantes[idx][inp.dataset.field] = inp.value;
    });
  });
}

function addHistory(type, msg, entityId=null) {
  const now = Date.now();
  S.history = S.history
    .concat({ id: now + Math.random(), type, msg, ts: now, entityId });
  // Sin expiración — el historial es permanente
}

// Mueve al historial las reservas cuya fecha de visita ya pasó,
// y las quita de la lista activa para que no se acumulen.
function archiveOldReservas() {
  const today = new Date().toISOString().split('T')[0];
  const vencidas = S.reservas.filter(r => r.fecha && r.fecha < today);
  if (!vencidas.length) return;

  vencidas.forEach(r => {
    const estadoFinal = badgeLabel(r.estado);
    addHistory('reserva_archivada',
      `Reserva archivada (${estadoFinal}): ${r.nombre} ${r.apellido||''} — visita del ${fmtDate(r.fecha)}`);
  });

  S.reservas = S.reservas.filter(r => !(r.fecha && r.fecha < today));
}

function fmtRelTime(ts) {
  const diff = Date.now() - ts;
  const m = Math.floor(diff / 60000);
  const h = Math.floor(diff / 3600000);
  const d = Math.floor(diff / 86400000);
  if (m < 1)  return 'Ahora mismo';
  if (m < 60) return `Hace ${m} min`;
  if (h < 24) return `Hace ${h} h`;
  return `Hace ${d} día${d>1?'s':''}`;
}

            ? S.history.slice().reverse().slice(0,4).map(h=>{
                const cfg = HIST_ICON[h.type]||{icon:'M12 5v14M5 12h14',col:'#6b7280'};

function renderFechaDetailRow(d) {
  const items = S.reservas.filter(r=>r.fecha===d.fecha && r.tipo===d.tipo && r.estado!=='rechazada');

    return `<tr><td colspan="6" style="background:var(--gray-100);padding:16px;font-size:12px;color:var(--gray-700);text-align:center">Sin reservas para esta fecha todavía</td></tr>`;
  }
  const rowsDetail = items.map(r => `
    <div style="display:flex;align-items:center;justify-content:space-between;padding:8px 12px;background:white;border-radius:6px;margin-bottom:6px">
      <div style="display:flex;align-items:center;gap:10px">
        <span style="font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.04em;padding:2px 7px;border-radius:4px;background:${r.tipo==='personal'?'#c8001a1a':r.tipo==='escolar'?'#1a3a6b1a':'#6b3a1a1a'};color:${r.tipo==='personal'?'#c8001a':r.tipo==='escolar'?'#1a3a6b':'#6b3a1a'}">${r.tipo}</span>
        <span style="font-size:13px;font-weight:600">${r.nombre} ${r.apellido||''}</span>

        <button class="btn-icon btn-view" data-fn="goToReserva" data-id="${r.id}" title="Ver en Gestión de Reservas" style="width:28px;height:28px">

function renderFechas() {
  const today = new Date().toISOString().split('T')[0];
  const sorted = [...S.fechasDisp].sort((a,b)=>a.fecha.localeCompare(b.fecha));
  const f = S.fechaForm;

  const tipoColors = {personal:'#c8001a', escolar:'#1a3a6b', institucional:'#6b3a1a'};
  const tipoLabels = {personal:'Personal', escolar:'Escolar', institucional:'Institucional'};

  const rows = sorted.map(d => {
    const col = tipoColors[d.tipo] || '#374151';
    const lbl = tipoLabels[d.tipo] || d.tipo;
    const max  = d.cupo || MAX_PERSONAL_PER_FECHA;
    const used = personasCountForFecha(d.fecha, d.tipo);
    const pct  = Math.min(100, Math.round((used/max)*100));
    const colorNum = pct>=100?'#ef4444':pct>=75?'#f59e0b':'#166534';

    // Ocupación: solo el número de personas ocupando esta fecha.
    const ocupacionHtml = `<span style="font-size:18px;font-weight:900;color:${colorNum};font-family:var(--font-display)">${used}</span>`;
    // Cupo máximo: editable directamente desde esta misma tabla (antes vivía en "Personal").
    const cupoInput = `<input type="number" class="cupo-edit-input" data-id="${d.id}" value="${max}" min="${used}" style="width:64px;border:1px solid var(--gray-200);border-radius:6px;padding:5px 8px;font-size:13px;font-family:inherit;font-weight:700"/>`;

    return `
    <tr>
      <td><strong>${fmtDate(d.fecha)}</strong></td>
      <td><span style="display:inline-block;font-size:11px;font-weight:800;letter-spacing:.04em;text-transform:uppercase;padding:3px 10px;border-radius:5px;background:${col}1a;color:${col}">${lbl}</span></td>
      <td>${d.horarios.join(' · ')}</td>
      <td>${ocupacionHtml}</td>
      <td>${cupoInput}</td>
      <td><span style="font-size:11px;font-weight:700;padding:3px 8px;border-radius:4px;background:${d.fecha>=today?'rgba(34,197,94,.12)':'rgba(107,114,128,.1)'};color:${d.fecha>=today?'#166534':'#374151'}">${d.fecha>=today?'Próxima':'Pasada'}</span></td>
      <td>
        <div style="display:flex;gap:4px">
          <button class="btn-icon btn-view" data-fn="toggleFechaDetail" data-id="${d.id}" title="Ver reservas de esta fecha">${S.fechaDetailOpen===d.id?ico.x:ico.eye}</button>
          <button class="btn-icon btn-reject" data-fn="removeFecha" data-id="${d.id}" title="Eliminar fecha">${ico.trash}</button>
        </div>
      </td>
    </tr>
    ${S.fechaDetailOpen===d.id ? renderFechaDetailRow(d) : ''}`;}).join('');

  const tipoSel = f.tipo || 'personal';

  return `

    <p style="font-size:14px;color:var(--gray-700);margin-bottom:24px">Definí qué días están habilitados para reservar y ajustá su cupo máximo. Cada fecha es exclusiva de un solo tipo de visita: no se mezclan Personal, Escolar e Institucional en la misma fecha.</p>

    <div style="display:grid;grid-template-columns:1fr 320px;gap:20px;align-items:start">

              No hay fechas configuradas

      </div>

      <!-- Formulario agregar -->

          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="margin-right:5px;vertical-align:middle"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Agregar fecha
        </button>
      </div>
    </div>`;
}

function renderHistorial() {
  const q     = nrm(S.histQ);
  const tipo  = S.histTipo;
  const desde = S.histDesde;
  const hasta = S.histHasta;

  const filtered = S.history.filter(h => {
    if (tipo && !h.type.startsWith(tipo)) return false;
    const d = new Date(h.ts).toISOString().split('T')[0];
    if (desde && d < desde) return false;
    if (hasta && d > hasta) return false;
    if (q && !nrm(h.msg).includes(q)) return false;
    return true;
  }).sort((a,b)=>b.ts-a.ts);

  const PER = 20;
  const totalPag = Math.max(1, Math.ceil(filtered.length/PER));
  const page = Math.min(S.histPage, totalPag);
  const slice = filtered.slice((page-1)*PER, page*PER);

  const rows = slice.map(h => {
    const cfg = HIST_ICON[h.type]||{icon:'M12 5v14M5 12h14',col:'#6b7280'};
    const dt  = new Date(h.ts);
    const dtStr = dt.toLocaleDateString('es-AR') + ' ' + dt.toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit'});
    // Determinar si hay un destino para el botón de redirección
    const isRv  = h.type.startsWith('reserva') && h.type !== 'reserva_archivada';
    const isObj = h.type.startsWith('obj') && h.type !== 'obj_eliminado';
    const entityExists = h.entityId && (
      isRv  ? S.reservas.some(r=>r.id===h.entityId)
            : isObj ? S.inv.some(i=>i.id===h.entityId) : false
    );

    const redirectBtn = entityExists ? `
      <button class="btn-icon btn-view" data-fn="${isRv?'goToReserva':'goToObj'}" data-id="${h.entityId}"
        title="Ver ${isRv?'reserva':'objeto'}" style="width:28px;height:28px;flex-shrink:0">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
      </button>` : '';

    return `
      <tr>
        <td>
          <div style="display:flex;align-items:center;gap:8px">
            <div style="width:28px;height:28px;border-radius:50%;background:${cfg.col}1a;display:flex;align-items:center;justify-content:center;flex-shrink:0">
              <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="${cfg.col}" stroke-width="2.5"><path d="${cfg.icon}"/></svg>
            </div>
            <span style="font-size:12px;font-weight:700;color:${cfg.col};text-transform:uppercase;letter-spacing:.04em">${h.type.replace(/_/g,' ')}</span>
          </div>
        </td>
        <td style="font-size:13px;font-weight:500;max-width:360px">${escHtml(h.msg)}</td>
        <td style="font-size:12px;color:var(--gray-700);white-space:nowrap">${dtStr}</td>
        <td>${redirectBtn}</td>
      </tr>`;
  }).join('');

  const tipoOpts = [
    ['','Todos los tipos'],['reserva','Reservas'],['obj','Objetos'],
  ];

  return `
    <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:16px;margin-bottom:8px">
      <h2 style="font-family:var(--font-display);font-size:26px;font-weight:900;text-transform:uppercase">Historial</h2>

      </div>

    </div>

      </table>

    ${renderPagHist(page, totalPag)}`;
}

function renderPagHist(page, total) {
  if (total<=1) return '';
  let btns = `<button class="pag-btn" data-fn="histPag" data-arg="prev" ${page===1?'disabled':''}>‹</button>`;
  for (let i=1;i<=total;i++) {
    if (total>7&&i>2&&i<total-1&&Math.abs(i-page)>1) { if(i===3||i===total-2) btns+='<span style="padding:0 4px;color:var(--gray-700)">…</span>'; continue; }
    btns+=`<button class="pag-btn ${i===page?'active':''}" data-fn="histPag" data-arg="${i}">${i}</button>`;
  }
  btns+=`<button class="pag-btn" data-fn="histPag" data-arg="next" ${page===total?'disabled':''}>›</button>`;
  return `<div class="pag">${btns}</div>`;
}

function renderAdminInv() {
  const q = nrm(S.invQ);
  const filtered = S.inv.filter(it => {
    if (S.invSala && it.sala!==S.invSala) return false;
    if (S.invCat  && it.categoria!==S.invCat) return false;
    if (S.invCol  && it.coleccion!==S.invCol) return false;
    if (q && ![it.nombre,it.codigo,it.categoria,it.coleccion,it.sala,it.vitrina,it.autor||'',it.epoca||'',it.descripcion||'',it.codigoAntiguo||'',it.codigoSigaf||''].some(v=>nrm(v).includes(q))) return false;
    return true;
  });

  const sorted = [...filtered].sort((a,b)=>a[S.invSort]?.localeCompare(b[S.invSort]));
  const perPage = S.invView==='grid' ? PER_PAGE_GRID : PER_PAGE_LIST;
  const totalPages = Math.max(1, Math.ceil(sorted.length / perPage));
  const page = Math.min(S.invPage, totalPages);
  const slice = sorted.slice((page-1)*perPage, page*perPage);

  const salas = [...new Set(S.inv.map(i=>i.sala))].sort();
  const cats  = [...new Set(S.inv.map(i=>i.categoria))].sort();
  const cols  = [...new Set(S.inv.map(i=>i.coleccion))].sort();

  const optSel = (id, val, opts, placeholder) =>
    `<select class="inv-filter-select" id="${id}">
      <option value="">${placeholder}</option>
      ${opts.map(o=>`<option value="${o}" ${val===o?'selected':''}>${o}</option>`).join('')}
    </select>`;

  let body = '';
  if (S.invView==='grid') {
    body = `<div class="inv-grid">${slice.map(invCard).join('')}</div>`;
  } else {
    const rows = slice.map(it=>`
      <div class="inv-list-row" data-fn="openInvModal" data-id="${it.id}">
        <div>
          <div class="inv-list-name">${escHtml(it.nombre)}</div>
          <div class="inv-list-sub">${escHtml(it.codigo)}</div>
        </div>
        <div style="text-transform:capitalize">${escHtml(it.categoria)}</div>
        <div>${escHtml(it.sala)}</div>
        <div>${escHtml(it.estado)}</div>
        <div>${escHtml(it.coleccion)}</div>
        <div><span class="badge ${it.estado==='Bueno'?'badge-green':it.estado==='Regular'?'badge-yellow':'badge-red'}">${it.estado}</span></div>
      </div>`).join('');
    body = `
      <div class="inv-list">
        <div class="inv-list-head"><div>Nombre</div><div>Categoría</div><div>Sala</div><div>Estado</div><div>Colección</div><div>·</div></div>
        ${rows||'<div style="padding:24px;color:var(--gray-700);text-align:center">Sin resultados</div>'}
      </div>`;
  }

  const pag = renderPag(page, totalPages);

  return `
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px">
      <h2 style="font-family:var(--font-display);font-size:26px;font-weight:900;text-transform:uppercase">Inventario</h2>
      <div style="display:flex;gap:8px">
        <button class="btn-sm btn-secondary" data-fn="openCatsModal">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-right:5px;vertical-align:middle"><path d="M20.59 13.41 11 23l-9-9 9.59-9.59A2 2 0 0 1 13 4h7v7a2 2 0 0 1-.41 1.41z"/><circle cx="16.5" cy="7.5" r="1"/></svg>
          Categorías
        </button>
        <button class="btn-sm btn-secondary" data-fn="openXlsx">${ico.upload} Importar planilla</button>
        <button class="btn-sm btn-primary" data-fn="openAddObj">${ico.plus} Agregar objeto</button>
      </div>
    </div>
    <div class="inv-toolbar">
      <input class="inv-search" id="inv-q" placeholder="Buscar sin importar acentos..." value="${escHtml(S.invQ)}"/>
      ${optSel('inv-sala',S.invSala,salas,'Todas las salas')}
      ${optSel('inv-cat',S.invCat,cats,'Todas las categorías')}
      ${optSel('inv-col',S.invCol,cols,'Todas las colecciones')}
      <div class="inv-view-toggle">
        <button class="inv-view-btn ${S.invView==='grid'?'active':''}" data-fn="invView" data-arg="grid" title="Grilla">${ico.grid}</button>
        <button class="inv-view-btn ${S.invView==='list'?'active':''}" data-fn="invView" data-arg="list" title="Lista">${ico.list}</button>
      </div>
    </div>
    <div class="inv-count">Mostrando ${slice.length} de ${filtered.length} objetos (página ${page} de ${totalPages})</div>
    ${body}
    ${pag}
    ${S.catsModalOpen ? renderCategoriasModal() : ''}`;
}

function renderPag(page, total) {
  if (total<=1) return '';
  let btns = `<button class="pag-btn" data-fn="invPag" data-arg="prev" ${page===1?'disabled':''}>‹</button>`;
  for (let i=1; i<=total; i++) {
    if (total>7 && i>2 && i<total-1 && Math.abs(i-page)>1) {
      if (i===3||i===total-2) btns+='<span style="padding:0 4px;color:var(--gray-700)">…</span>';
      continue;
    }
    btns += `<button class="pag-btn ${i===page?'active':''}" data-fn="invPag" data-arg="${i}">${i}</button>`;
  }
  btns += `<button class="pag-btn" data-fn="invPag" data-arg="next" ${page===total?'disabled':''}>›</button>`;
  return `<div class="pag">${btns}</div>`;
}

function renderToastEl() {
  let el = document.getElementById('toast-container');
  if (!el) {
    el = document.createElement('div');
    el.id = 'toast-container';
    document.body.appendChild(el);
  }
  el.innerHTML = S.toast
    ? `<div class="toast"><div class="toast-icon">${ico.check}</div>${escHtml(S.toast)}</div>`
    : '';
}

// ══════════════════════════════════════════════
//  RENDER PRINCIPAL
// ══════════════════════════════════════════════
function render() {
  const app = document.getElementById('app');
  const isLogin = S.route==='/admin' && !S.auth;

  let html = '';
  if (!isLogin) html += renderNavbar();
  html += renderPage();

  // Modales activos
  if (S.editOpen && S.invModal) html += renderEditModal(S.invModal);
  else if (S.invModal) html += renderInvModal(S.invModal);
  if (S.rvModal)  html += renderRvModal(S.rvModal);
  if (S.addOpen)  html += renderAddObjModal();
  if (S.xlsxOpen) html += renderXlsxModal();
  if (S.deleteConfirm) html += renderDeleteConfirmModal(S.deleteConfirm);
  if (S.clearHistoryConfirm) html += renderClearHistoryConfirmModal();

  app.innerHTML = html;
  attachEvents();
  renderToastEl();
}

function renderPage() {
  if (S.route==='/')         return renderHome();
  if (S.route==='/reservas') return renderReservas();
  if (S.route==='/admin')    return S.auth ? renderAdmin() : renderLogin();
  return `<div class="page" style="min-height:100vh;display:flex;align-items:center;justify-content:center"><h1 style="font-family:var(--font-display);font-size:64px;color:var(--gray-200)">404</h1></div>`;
}

// ══════════════════════════════════════════════
//  EVENTOS
// ══════════════════════════════════════════════
function attachEvents() {
  // Delegación de clics — se adjunta UNA SOLA VEZ en la vida de la app.
  // (attachEvents() se llama en cada render, así que sin este guard el
  // listener se acumulaba infinitamente y cada click disparaba handleClick
  // múltiples veces, causando comportamientos erráticos en cascada.)
  if (!window.__appClickBound) {
    document.getElementById('app').addEventListener('click', handleClick);
    window.__appClickBound = true;
  }

  // Formulario de reserva
  const rvForm = document.getElementById('rv-form');
  if (rvForm) rvForm.addEventListener('submit', e => { e.preventDefault(); fn_rvSubmit(); });

  // Inputs de filtros de reservas admin
  bindInput('rv-q', v => { S.rvQ=v; S.invPage=1; renderAdminPart(); });
  bindSelect('rv-tipo', v => { S.rvTipo=v; renderAdminPart(); });
  bindSelect('rv-status', v => { S.rvStatus=v; renderAdminPart(); });

  // Inputs de inventario
  bindInput('inv-q',   v => { S.invQ=v;   S.invPage=1; renderAdminPart(); });
  bindSelect('inv-sala', v => { S.invSala=v; S.invPage=1; renderAdminPart(); });
  bindSelect('inv-cat',  v => { S.invCat=v;  S.invPage=1; renderAdminPart(); });
  bindSelect('inv-col',  v => { S.invCol=v;  S.invPage=1; renderAdminPart(); });

  // Login enter
  const lgUser = document.getElementById('lg-user');
  const lgPass = document.getElementById('lg-pass');
  if (lgUser) lgUser.addEventListener('keydown', e => e.key==='Enter' && lgPass?.focus());
  if (lgPass) lgPass.addEventListener('keydown', e => e.key==='Enter' && fn_doLogin());

  // XLSX file input
  const xlsxFile = document.getElementById('xlsx-file');
  if (xlsxFile) xlsxFile.addEventListener('change', e => fn_xlsxLoad(e.target));

  // Add obj propiedad change — sincronizar TODOS los campos antes de re-renderizar
  const addProp = document.getElementById('add-propiedad');
  if (addProp) addProp.addEventListener('change', e => {
    syncAddFormFromDOM();
    S.addForm.propiedad = e.target.value;
    renderModalPart('add');
  });
  // Imagen upload — Add obj
  const addImgInput = document.getElementById('add-img-input');
  if (addImgInput) addImgInput.addEventListener('change', e => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      S.addForm.imagen = ev.target.result;
      const prev = document.getElementById('add-img-preview');
      if (prev) prev.innerHTML = `<img src="${ev.target.result}" style="max-height:180px;border-radius:10px;max-width:100%;object-fit:cover"/>`;
    };
    reader.readAsDataURL(file);
  });

  // Imagen upload — Edit obj
  const editImgInput = document.getElementById('edit-img-input');
  if (editImgInput) editImgInput.addEventListener('change', e => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      S.editForm.imagen = ev.target.result;
      const prev = document.getElementById('edit-img-preview');
      if (prev) prev.innerHTML = `<img src="${ev.target.result}" style="max-height:180px;border-radius:10px;max-width:100%;object-fit:cover"/>`;
    };
    reader.readAsDataURL(file);
  });

  // Edit obj propiedad change — sincronizar todos los campos antes de re-renderizar
  // Usamos renderModalPart('edit') (re-render PARCIAL solo del modal) en vez de
  // render() completo, para no reconstruir toda la página y así no perder la
  // posición de scroll del usuario.
  const editProp = document.getElementById('edit-propiedad');
  if (editProp) editProp.addEventListener('change', e => {
    syncEditFormFromDOM();
    S.editForm.propiedad = e.target.value;
    renderModalPart('edit');
  });

  // Fechas admin: selector de tipo (Personal/Escolar/Institucional) — excluyente
  document.querySelectorAll('[data-tipo-fecha]').forEach(btn => {
    btn.addEventListener('click', () => {
      S.fechaForm.tipo = btn.dataset.tipoFecha;
      renderAdminPart();
    });
  });

  // Fechas admin: editar cupo inline (cualquier tipo)
  document.querySelectorAll('.cupo-edit-input').forEach(el => {
    el.addEventListener('change', () => {
      const id = parseInt(el.dataset.id);
      let val = parseInt(el.value);
      const fechaObj = S.fechasDisp.find(d=>d.id===id);
      const used = fechaObj ? personasCountForFecha(fechaObj.fecha, fechaObj.tipo) : 0;
      if (!val || val < 1) val = MAX_PERSONAL_PER_FECHA;
      if (val < used) {
        showToast(`No se puede bajar de ${used}, ya hay esa cantidad de personas anotadas`);
        val = used;
      }
      S.fechasDisp = S.fechasDisp.map(d => d.id===id ? {...d, cupo:val} : d);
      renderAdminPart();
      showToast('Cupo actualizado');
    });
  });

  // Reservas: al cambiar la fecha, repoblar horarios disponibles sin
  // reiniciar el formulario ni saltar al inicio de la página.
  const rvFechaEl = document.getElementById('rv-fecha');
  if (rvFechaEl) rvFechaEl.addEventListener('change', e => {
    // Guardar TODOS los campos actuales (incluida la lista de integrantes)
    // para no perder lo que ya se llenó.
    syncRvFormFromDOM();
    S.rvForm = { ...S.rvForm, fecha: e.target.value, horario: '' };
    renderReservasPart();
  });

  // Reservas escolares: al cambiar la cantidad de docentes, mostrar/ocultar
  // la sección para cargar los datos de cada docente adicional (sin perder
  // scroll ni lo ya tipeado en el resto del formulario).
  const rvDocentesEl = document.getElementById('rv-docentes');
  if (rvDocentesEl) rvDocentesEl.addEventListener('change', () => {
    syncRvFormFromDOM();
    renderReservasPart();
  });

  // Filtros del historial
  bindInput('hist-q',     v => { S.histQ=v; S.histPage=1; renderAdminPart(); });
  bindSelect('hist-tipo', v => { S.histTipo=v; S.histPage=1; renderAdminPart(); });
  bindInput('hist-desde', v => { S.histDesde=v; S.histPage=1; renderAdminPart(); });
  bindInput('hist-hasta', v => { S.histHasta=v; S.histPage=1; renderAdminPart(); });

  // ── Restricciones en tiempo real — Reservas ──
  // Nombre y Apellido: solo letras, espacios y guión
  ['rv-nombre','rv-apellido'].forEach(id => {
    const el = document.getElementById(id);
    if (!el) return;
    el.addEventListener('input', () => {
      const pos = el.selectionStart;
      const cleaned = el.value.replace(/[^a-zA-ZÀ-ÿñÑ\s'\-]/g, '');
      if (el.value !== cleaned) { el.value = cleaned; el.setSelectionRange(pos-1,pos-1); }
    });
  });

  // DNI: solo números, máximo 8 dígitos
  const dniEl = document.getElementById('rv-dni');
  if (dniEl) dniEl.addEventListener('input', () => {
    dniEl.value = dniEl.value.replace(/\D/g,'').slice(0,8);
  });

  // CUE: solo números, exactamente 9 dígitos
  const cueEl = document.getElementById('rv-cue');
  if (cueEl) cueEl.addEventListener('input', () => {
    cueEl.value = cueEl.value.replace(/\D/g,'').slice(0,9);
  });

  // Teléfono: números, espacios, guiones, paréntesis y "+" — máx. 20 caracteres
  const telEl = document.getElementById('rv-tel');
  if (telEl) telEl.addEventListener('input', () => {
    telEl.value = telEl.value.replace(/[^\d\s\-\(\)\+]/g,'').slice(0,20);
  });

  // Campos numéricos de cantidad
  ['rv-estudiantes','rv-docentes','rv-personas'].forEach(id => {
    const el = document.getElementById(id);
    if (!el) return;
    el.addEventListener('input', () => {
      el.value = el.value.replace(/\D/g,'');
      if (el.value && parseInt(el.value) < 1) el.value = '1';
    });
  });

  // Institución: no puede empezar con número
  const instEl = document.getElementById('rv-institucion');
  if (instEl) instEl.addEventListener('input', () => {
    if (/^\d/.test(instEl.value)) instEl.value = instEl.value.slice(1);
  });

  // Campos de acompañantes/integrantes: DNI solo dígitos (máx 8), nombre y
  // apellido solo letras — misma restricción que se aplica al titular.
  document.querySelectorAll('.integrante-field[data-field="dni"]').forEach(el => {
    el.addEventListener('input', () => { el.value = el.value.replace(/\D/g,'').slice(0,8); });
  });
  document.querySelectorAll('.integrante-field[data-field="nombre"], .integrante-field[data-field="apellido"]').forEach(el => {
    el.addEventListener('input', () => { el.value = el.value.replace(/[^a-zA-ZÀ-ÿñÑ\s'\-]/g,''); });
  });
}

function bindInput(id, cb) {
  const el = document.getElementById(id);
  if (!el) return;
  el.addEventListener('input', e => {
    const val = e.target.value;
    const pos = e.target.selectionStart;
    cb(val);
    // Restaurar foco y posición de cursor después del re-render
    const restored = document.getElementById(id);
    if (restored) {
      restored.focus();
      try { restored.setSelectionRange(pos, pos); } catch(_) {}
    }
  });
}

function bindSelect(id, cb) {
  const el = document.getElementById(id);
  if (!el) return;
  el.addEventListener('change', e => {
    const val = e.target.value;
    cb(val);
    // Restaurar foco al select después del re-render
    const restored = document.getElementById(id);
    if (restored) restored.focus();
  });
}

function handleClick(e) {
  const target = e.target.closest('[data-fn]');
  if (!target) return;
  const fn  = target.dataset.fn;
  const arg = target.dataset.arg;
  const id  = target.dataset.id ? parseInt(target.dataset.id) : null;
  const idx = target.dataset.idx !== undefined ? parseInt(target.dataset.idx) : null;

  const map = {
    navigate:     () => navigate(arg),
    rvTab:        () => { S.rvTab=arg; S.rvForm={}; S.rvErrs={}; S.rvIntegrantes=[]; render(); },
    rvReset:      () => { S.rvOk=false; S.rvPendiente=false; S.rvForm={}; S.rvIntegrantes=[]; render(); },
    rvSubmit:     () => fn_rvSubmit(),
    addIntegrante:() => {
      syncRvFormFromDOM();
      S.rvIntegrantes = [...S.rvIntegrantes, {nombre:'',apellido:'',dni:''}];
      renderReservasPart();
    },
    removeIntegrante:() => {
      syncRvFormFromDOM();
      S.rvIntegrantes = S.rvIntegrantes.filter((_,i)=>i!==idx);
      renderReservasPart();
    },
    doLogin:      () => fn_doLogin(),
    logout:       () => { S.auth=null; sessionStorage.removeItem('museum_auth'); S.adminTab='dash'; navigate('/'); },
    adminTab:     () => { S.adminTab=arg; render(); window.scrollTo({top:0,behavior:'smooth'}); },
    invView:      () => { S.invView=arg; S.invPage=1; render(); },
    invPag:       () => {
      const cur = S.invPage;
      const filtered = getFilteredInv();
      const total = Math.max(1, Math.ceil(filtered.length/(S.invView==='grid'?PER_PAGE_GRID:PER_PAGE_LIST)));
      if (arg==='prev') S.invPage = Math.max(1, cur-1);
      else if (arg==='next') S.invPage = Math.min(total, cur+1);
      else S.invPage = parseInt(arg);
      render();
    },
    openInvModal: () => {
      S.invModal = S.inv.find(i=>i.id===id)||null;
      render();
    },
    closeInvModal:() => { S.invModal=null; render(); },
    askDeleteInvItem: () => {
      const item = S.inv.find(i=>i.id===id);
      if (item) S.deleteConfirm = item;
      render();
    },
    cancelDeleteInvItem: () => { S.deleteConfirm = null; render(); },
    askClearHistory: () => { S.clearHistoryConfirm = true; render(); },
    cancelClearHistory: () => { S.clearHistoryConfirm = false; render(); },
    confirmClearHistory: () => {
      const count = S.history.length;
      S.history = [];
      S.clearHistoryConfirm = false;
      render();
      showToast(`Historial vaciado (${count} entradas eliminadas)`);
    },
    confirmDeleteInvItem: () => {
      const item = S.inv.find(i=>i.id===id);
      const name = item?.nombre||'Objeto';
      S.inv = S.inv.filter(i=>i.id!==id);
      S.invModal = null;
      S.deleteConfirm = null;
      addHistory('obj_eliminado', `Objeto eliminado: "${name}"`);
      render();
      showToast(`"${name}" eliminado del inventario`);
    },
    openEditObj:  () => { S.editOpen=true; S.editForm={}; S.editErrs={}; render(); },
    closeEditObj: () => { S.editOpen=false; S.editErrs={}; render(); },
    submitEditObj:() => fn_submitEditObj(id),
    openAddObj:   () => { S.addOpen=true; S.addForm={}; S.addErrs={}; render(); },
    closeAddObj:  () => { S.addOpen=false; render(); },
    clearAddImg:  () => { S.addForm.imagen = null; render(); },
    clearEditImg: () => { S.editForm.imagen = null; render(); },
    submitAddObj: () => fn_submitAddObj(),
    openXlsx:     () => { S.xlsxOpen=true; S.xlsxData=[]; S.xlsxSel=new Set(); render(); },
    closeXlsx:    () => { S.xlsxOpen=false; render(); },
    xlsxSelAll:   () => { S.xlsxSel=new Set(S.xlsxData.map((_,i)=>i)); render(); },
    xlsxSelNone:  () => { S.xlsxSel=new Set(); render(); },
    xlsxToggle:   () => {
      if (idx===null) return;
      S.xlsxSel.has(idx) ? S.xlsxSel.delete(idx) : S.xlsxSel.add(idx);
      render();
    },
    xlsxImport:   () => fn_xlsxImport(),
    toggleFechaDetail: () => { S.fechaDetailOpen = S.fechaDetailOpen===id ? null : id; renderAdminPart(); },
    goToReserva: () => {
      S.adminTab = 'rv';
      S.rvModal = S.reservas.find(r=>r.id===id)||null;
      S.fechaDetailOpen = null;
      render();
    },
    goToObj: () => {
      S.adminTab = 'inv';
      S.invModal = S.inv.find(i=>i.id===id)||null;
      render();
    },
    addFecha:     () => fn_addFecha(),
    removeFecha:  () => { S.fechasDisp = S.fechasDisp.filter(d=>d.id!==id); render(); showToast('Fecha eliminada'); },
    histPag:      () => {
      const tot = Math.max(1, Math.ceil(S.history.length/20));
      if (arg==='prev') S.histPage = Math.max(1, S.histPage-1);
      else if (arg==='next') S.histPage = Math.min(tot, S.histPage+1);
      else S.histPage = parseInt(arg);
      render();
    },
    histClear:    () => { S.histQ=''; S.histTipo=''; S.histDesde=''; S.histHasta=''; S.histPage=1; render(); },
    rvView:       () => { S.rvModal = S.reservas.find(r=>r.id===id)||null; render(); },
    closeRvModal: () => { S.rvModal=null; render(); },
    rvApprove:    () => {
      const _ra = S.reservas.find(r=>r.id===id); S.reservas = S.reservas.map(r=>r.id===id?{...r,estado:'aprobada'}:r);
      S.rvModal = null; addHistory('reserva_aprobada', `Reserva aprobada: ${_ra?.nombre||''} ${_ra?.apellido||''}`, id); render();
      showToast('Reserva aprobada');
    },
    rvReject:     () => {
      const _rr = S.reservas.find(r=>r.id===id); S.reservas = S.reservas.map(r=>r.id===id?{...r,estado:'rechazada'}:r);
      S.rvModal = null; addHistory('reserva_rechazada', `Reserva rechazada: ${_rr?.nombre||''} ${_rr?.apellido||''}`, id); render();
      showToast('Reserva rechazada');
    },
    addCategoria: () => fn_addCategoria(),
    openCatsModal: () => { S.catsModalOpen = true; S.catForm = {}; S.catErrs = {}; S.catEditing = null; renderAdminPart(); },
    collCarousel: () => {
      const max = Math.max(0, COLECCIONES_DESTACADAS.length - 5);
      if (arg === 'next') S.collCarouselIdx = Math.min(max, S.collCarouselIdx + 1);
      else S.collCarouselIdx = Math.max(0, S.collCarouselIdx - 1);
      render();
    },
    closeCatsModal:() => { S.catsModalOpen = false; S.catEditing = null; S.catDeleteConfirm = null; renderAdminPart(); },
    startCatEdit: () => { S.catEditing = arg; S.catForm.editNombre = arg; S.catErrs = {}; renderAdminPart(); },
    cancelCatEdit:() => { S.catEditing = null; S.catForm.editNombre = undefined; S.catErrs = {}; renderAdminPart(); },
    saveCatEdit:  () => fn_saveCatEdit(arg),
    askDeleteCat: () => { S.catDeleteConfirm = arg; renderAdminPart(); },
    cancelDeleteCat: () => { S.catDeleteConfirm = null; renderAdminPart(); },
    confirmDeleteCat: () => fn_confirmDeleteCat(arg),
  };

  e.stopPropagation();
  map[fn]?.();
}
