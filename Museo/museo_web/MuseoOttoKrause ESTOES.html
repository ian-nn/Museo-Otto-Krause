function fn_doLogin() {
  const user = document.getElementById('lg-user')?.value.trim()||'';
  const pass = document.getElementById('lg-pass')?.value||'';
  const ok = CREDENTIALS.find(c=>c.user===user&&c.pass===pass);
  if (ok) {
    S.auth = user;
    S.lgErr = '';
    sessionStorage.setItem('museum_auth', user);
    render();
  } else {
    S.lgErr = 'Usuario o contraseña incorrectos';
    S.lgUser = user;
    render();
  }
}

function fn_rvSubmit() {
  const f = {};
  document.querySelectorAll('[data-rv-field]').forEach(el => { f[el.dataset.rvField] = el.value.trim(); });
  S.rvForm = f;

  // Sincronizar lista de integrantes (acompañantes/docentes/personas de la
  // organización) y descartar filas completamente vacías antes de validar.
  syncRvFormFromDOM();
  const integrantes = S.rvIntegrantes
    .map(p => ({ nombre:(p.nombre||'').trim(), apellido:(p.apellido||'').trim(), dni:(p.dni||'').trim() }))
    .filter(p => p.nombre || p.apellido || p.dni);

  const e = {};
  const LETRAS = /^[a-zA-ZÀ-ÿñÑ\s'\-]+$/;
  const EMAIL  = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
  const TEL    = /^[\d\s\-\(\)\+]{7,20}$/;

  // Validar los campos de cada acompañante/integrante cargado: nombre y
  // apellido obligatorios y solo letras, DNI obligatorio de 7 u 8 dígitos.
  // Se valida sobre la lista YA sincronizada (S.rvIntegrantes), no sobre la
  // lista filtrada "integrantes" (que descarta filas vacías), para poder
  // marcar el error en la fila exacta donde falta el dato.
  const integranteErrs = S.rvIntegrantes.map(p => {
    const nombre   = (p.nombre||'').trim();
    const apellido = (p.apellido||'').trim();
    const dni      = (p.dni||'').trim();
    const rowErr = {};
    // Solo validar filas que tengan al menos un campo cargado (evita marcar
    // en rojo una fila que el usuario recién agregó y no tocó todavía).
    if (nombre || apellido || dni) {
      if (!nombre || !LETRAS.test(nombre))     rowErr.nombre   = 'Solo letras';
      if (!apellido || !LETRAS.test(apellido)) rowErr.apellido = 'Solo letras';
      if (!dni || !/^\d{7,8}$/.test(dni))      rowErr.dni      = '7 u 8 dígitos';
    }
    return rowErr;
  });
  if (integranteErrs.some(r => Object.keys(r).length)) e.integrantes = integranteErrs;

  if (!f.nombre  || !LETRAS.test(f.nombre))   e.nombre   = 'Solo letras, sin números';
  if (!f.apellido|| !LETRAS.test(f.apellido)) e.apellido = 'Solo letras, sin números';
  if (!f.email   || !EMAIL.test(f.email))     e.email    = 'Formato de email inválido';

  // No permitir más de una reserva PERSONAL activa con el mismo email
  if (f.email && !e.email && S.rvTab === 'personal') {
    const emailNorm = f.email.trim().toLowerCase();
    const yaExiste = S.reservas.some(r =>
      r.tipo === 'personal' &&
      r.estado !== 'rechazada' &&
      (r.email||'').trim().toLowerCase() === emailNorm
    );
    if (yaExiste) {
      e.email = 'Ya existe una reserva personal activa con este email.';
    }
  }
  if (!f.tel     || !TEL.test(f.tel))         e.tel      = 'Solo números, espacios, guiones, paréntesis y "+" (7 a 20 caracteres)';

  if (S.rvTab === 'personal') {
    if (!f.dni || !/^\d{7,8}$/.test(f.dni)) e.dni = 'DNI: 7 u 8 dígitos numéricos';
    // personas = titular + acompañantes cargados, no se valida como campo aparte
  }
  if (S.rvTab === 'escolar') {
    if (!f.institucion) e.institucion = 'Ingresá el nombre de la institución';
    if (!f.cue || !/^\d{9}$/.test(f.cue)) e.cue = 'CUE: exactamente 9 dígitos';
    if (!f.estudiantes || parseInt(f.estudiantes) < 1) e.estudiantes = 'Ingresá la cantidad de estudiantes';
    if (!f.docentes|| parseInt(f.docentes)< 1) e.docentes= 'Ingresá la cantidad de docentes';
    // Si hay más de un docente, exigir que se haya cargado el dato de cada uno adicional
    if (!e.docentes && parseInt(f.docentes) > 1 && integrantes.length < parseInt(f.docentes)-1) {
      e.docentes = `Cargá los datos de los ${parseInt(f.docentes)-1} docentes acompañantes adicionales`;
    }
  }
  if (S.rvTab === 'institucional') {
    if (!f.institucion) e.institucion = 'Ingresá el nombre de la organización';
    if (!f.personas || parseInt(f.personas) < 1) e.personas = 'Ingresá la cantidad de personas';
    // Exigir los datos de cada persona que va a asistir
    if (!e.personas && integrantes.length < parseInt(f.personas)) {
      e.personas = `Cargá los datos de las ${parseInt(f.personas)} personas que asisten (faltan ${parseInt(f.personas)-integrantes.length})`;
    }
  }
  if (!f.fecha)   e.fecha   = 'Seleccioná una fecha';
  if (!f.horario) e.horario = 'Seleccioná un horario';

  // Verificación de integridad: la fecha elegida debe pertenecer a este tipo exclusivamente
  if (f.fecha && !e.fecha) {
    const fechaObj = S.fechasDisp.find(d=>d.fecha===f.fecha);
    if (!fechaObj || fechaObj.tipo !== S.rvTab) {
      e.fecha = 'Esta fecha no está habilitada para este tipo de visita';
    }
  }

  // Exclusividad escolar/institucional: si otra institución ya tiene esta fecha aprobada, bloquear
  if (f.fecha && !e.fecha && S.rvTab !== 'personal') {
    const yaConfirmada = S.reservas.some(r=>r.fecha===f.fecha && r.tipo===S.rvTab && r.estado==='aprobada');
    if (yaConfirmada) {
      e.fecha = 'Esta fecha ya fue confirmada por otra institución. Elegí otra fecha.';
    }
  }

  // Verificar cupo — comportamiento diferente por tipo:
  // Personal: bloqueo duro si supera cupo
  // Escolar/Institucional: se permite pero queda en "pendiente" para revisión del admin
  let overCap = false;
  if (f.fecha && !e.fecha) {
    const max       = getMaxCupo(f.fecha);
    const used      = personasCountForFecha(f.fecha, S.rvTab);
    const requested = personasRequestedFor(S.rvTab, f, integrantes);
    const left      = max - used;
    if (requested > left) {
      if (S.rvTab === 'personal') {
        // Personal: bloqueo estricto
        e.fecha = left <= 0
          ? `Cupo completo para esta fecha (máx. ${max} personas). Elegí otra fecha.`
          : `Solo quedan ${left} cupo${left!==1?'s':''} para esta fecha. Elegí otra fecha.`;
      } else {
        // Escolar/Institucional: se permite, quedará pendiente
        overCap = true;
      }
    }
  }

  S.rvErrs = e;
  if (Object.keys(e).length) { render(); window.scrollTo({top:0,behavior:'smooth'}); return; }

  // Personal: titular + acompañantes · Escolar/Institucional: suma real de personas
  const personas = S.rvTab === 'personal' ? 1+integrantes.length : parseInt(f.personas || f.estudiantes || 1);
  // Estado según tipo y cupo:
  const estado = overCap ? 'pendiente'    // supera cupo → admin revisa
               : S.rvTab === 'personal' ? 'aprobada'
               : 'aprobada';

  // ID correlativo (#1, #2, #3...) en vez de timestamp, para que "Detalle de
  // reserva #N" sea siempre un número simple y consecutivo.
  const nextId = S.reservas.length ? Math.max(...S.reservas.map(r=>r.id)) + 1 : 1;
  const nueva = { id: nextId, tipo: S.rvTab, ...f, personas, integrantes, estado };
  S.reservas = [...S.reservas, nueva];
  addHistory('reserva_nueva', `Nueva reserva ${S.rvTab}: ${f.nombre} ${f.apellido||''} (${estado})`, nueva.id);
  S.rvPendiente = (estado === 'pendiente');
  S.rvOk = true;
  S.rvIntegrantes = [];
  render();
  window.scrollTo({top:0,behavior:'smooth'});
}

function syncAddFormFromDOM() {
  // Detecta automáticamente TODOS los campos del modal (inputs, selects, textarea)
  // en lugar de depender de una lista manual que puede desactualizarse.
  const modal = document.getElementById('add-modal-overlay');
  if (!modal) return;
  modal.querySelectorAll('input[id^="add-"], select[id^="add-"], textarea[id^="add-"]').forEach(el => {
    if (el.type === 'file') return; // el archivo no se sincroniza por value
    const key = el.id.replace(/^add-/, '');
    S.addForm[key] = el.value;
  });
}

function syncEditFormFromDOM() {
  const modal = document.getElementById('edit-modal-overlay');
  if (!modal) return;
  modal.querySelectorAll('input[id^="edit-"], select[id^="edit-"], textarea[id^="edit-"]').forEach(el => {
    if (el.type === 'file') return;
    const key = el.id.replace(/^edit-/, '');
    S.editForm[key] = el.value;
  });
}

function fn_submitAddObj() {
  // Capturar la imagen ANTES de pisar S.addForm más abajo (S.addForm = f)
  const imagenActual = S.addForm.imagen;

  // Leer todos los campos del formulario
  const readVal = id => document.getElementById('add-'+id)?.value?.trim()||'';
  const f = {
    nombre: readVal('nombre'), codigo: readVal('codigo').toUpperCase(),
    codigoAntiguo: readVal('codigoAntiguo'), codigoSigaf: readVal('codigoSigaf'),
    codigoFisico: readVal('codigoFisico'), dimensiones: readVal('dimensiones'),
    descripcion: document.getElementById('add-descripcion')?.value?.trim()||'',
    autor: readVal('autor'), epoca: readVal('epoca'),
    categoria: readVal('categoria'), coleccion: readVal('coleccion'),
    material: readVal('material'), estado: readVal('estado'),
    sala: readVal('sala'), vitrina: readVal('vitrina'), cajon: readVal('cajon')||'—',
    propiedad: readVal('propiedad'), donante: readVal('donante'),
  };
  if (imagenActual) f.imagen = imagenActual;
  S.addForm = f;

  const e = {};
  if (!f.nombre)    e.nombre    = 'Campo requerido';
  if (!f.codigo)    e.codigo    = 'Campo requerido';
  if (!f.categoria) e.categoria = 'Seleccioná una categoría';
  if (!f.coleccion) e.coleccion = 'Seleccioná una colección';
  if (!f.material)  e.material  = 'Campo requerido';
  if (!f.estado)    e.estado    = 'Seleccioná el estado';
  if (!f.sala)      e.sala      = 'Seleccioná un piso';
  if (!f.vitrina)   e.vitrina   = 'Campo requerido';
  if (!f.propiedad) e.propiedad = 'Seleccioná propiedad';
  if (f.propiedad==='Donado'&&!f.donante) e.donante = 'Campo requerido si es donado';

  S.addErrs = e;
  if (Object.keys(e).length) { render(); return; }

  const nextId = S.inv.length ? Math.max(...S.inv.map(i=>i.id))+1 : 1;
  // Salvaguarda: el código es obligatorio y ya se validó arriba, pero por
  // robustez nunca debe guardarse un objeto con código vacío (eso dejaría
  // la insignia de código vacía en la tarjeta del inventario).
  if (!f.codigo) f.codigo = `OK-${String(nextId).padStart(4,'0')}`;
  S.inv = [...S.inv, {id:nextId,...f,donante:f.propiedad==='Donado'?f.donante:'—'}];
  S.addOpen = false; S.addForm = {}; S.addErrs = {};
  addHistory('obj_agregado', `Objeto agregado: "${f.nombre}"`, nextId);
  render();
  showToast(`"${f.nombre}" agregado al inventario`);
}

function fn_submitEditObj(id) {
  // Capturar la imagen ANTES de pisar S.editForm más abajo
  const imagenActual = S.editForm.imagen;

  const readVal = key => document.getElementById('edit-'+key)?.value?.trim()||'';
  const f = {
    nombre:        readVal('nombre'),
    codigo:        readVal('codigo').toUpperCase(),
    codigoAntiguo: readVal('codigoAntiguo'),
    codigoSigaf:   readVal('codigoSigaf'),
    codigoFisico:  readVal('codigoFisico'),
    dimensiones:   readVal('dimensiones'),
    descripcion:   document.getElementById('edit-descripcion')?.value?.trim()||'',
    autor:         readVal('autor'),
    epoca:         readVal('epoca'),
    categoria:     readVal('categoria'),
    coleccion:     readVal('coleccion'),
    material:      readVal('material'),
    estado:        readVal('estado'),
    sala:          readVal('sala'),
    vitrina:       readVal('vitrina'),
    cajon:         readVal('cajon')||'—',
    propiedad:     readVal('propiedad'),
    donante:       readVal('donante'),
  };
  if (imagenActual !== undefined) f.imagen = imagenActual;

  const e = {};
  if (!f.nombre)    e.nombre    = 'Campo requerido';
  if (!f.codigo)    e.codigo    = 'Campo requerido';
  if (!f.categoria) e.categoria = 'Seleccioná una categoría';
  if (!f.coleccion) e.coleccion = 'Seleccioná una colección';
  if (!f.material)  e.material  = 'Campo requerido';
  if (!f.estado)    e.estado    = 'Seleccioná el estado';
  if (!f.sala)      e.sala      = 'Seleccioná un piso';
  if (!f.vitrina)   e.vitrina   = 'Campo requerido';
  if (!f.propiedad) e.propiedad = 'Seleccioná propiedad';
  if (f.propiedad==='Donado' && !f.donante) e.donante = 'Campo requerido si es donado';

  S.editErrs = e;
  S.editForm = f;
  if (Object.keys(e).length) { render(); return; }

  // Salvaguarda: nunca guardar un objeto con código vacío.
  if (!f.codigo) {
    const original = S.inv.find(i=>i.id===id);
    f.codigo = original?.codigo || `OK-${String(id).padStart(4,'0')}`;
  }

  S.inv = S.inv.map(item => item.id===id
    ? { ...item, ...f, donante: f.propiedad==='Donado' ? f.donante : '—' }
    : item
  );
  // Actualizar invModal con datos nuevos
  S.invModal = S.inv.find(i=>i.id===id)||null;
  S.editOpen = false;
  S.editForm = {};
  S.editErrs = {};
  render();
  addHistory('obj_editado', `Objeto editado: "${f.nombre}"`, id);
  showToast(`"${f.nombre}" actualizado correctamente`);
}

// ══════════════════════════════════════════════
//  CATEGORÍAS — crear / editar / eliminar
// ══════════════════════════════════════════════
function normCat(s) { return (s||'').trim().toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,''); }

function fn_addCategoria() {
  const val = (document.getElementById('cat-new-input')?.value || '').trim();
  const e = {};
  if (!val) e.nuevo = 'Ingresá un nombre de categoría';
  else if (S.cats.some(c => normCat(c) === normCat(val))) e.nuevo = 'Ya existe una categoría con ese nombre';

  S.catErrs = e;
  if (Object.keys(e).length) { renderAdminPart(); return; }

  S.cats = [...S.cats, val];
  S.catForm.nuevo = '';
  S.catErrs = {};
  addHistory('cat_agregada', `Categoría agregada: "${val}"`, null);
  renderAdminPart();
  showToast(`Categoría "${val}" agregada`);
}

function fn_saveCatEdit(oldName) {
  const val = (document.getElementById('cat-edit-input')?.value || '').trim();
  const e = {};
  if (!val) e.editNombre = 'Ingresá un nombre de categoría';
  else if (val !== oldName && S.cats.some(c => normCat(c) === normCat(val))) e.editNombre = 'Ya existe una categoría con ese nombre';

  S.catErrs = e;
  if (Object.keys(e).length) { renderAdminPart(); return; }

  // Renombrar la categoría y propagar el cambio a todos los objetos que la usan,
  // para no romper la integridad referencial del inventario.
  S.cats = S.cats.map(c => c === oldName ? val : c);
  S.inv  = S.inv.map(it => it.categoria === oldName ? { ...it, categoria: val } : it);

  S.catEditing = null;
  S.catForm.editNombre = undefined;
  S.catErrs = {};
  addHistory('cat_editada', `Categoría renombrada: "${oldName}" → "${val}"`, null);
  renderAdminPart();
  showToast(`Categoría renombrada a "${val}"`);
}

function fn_confirmDeleteCat(cat) {
  const enUso = S.inv.filter(it => it.categoria === cat);
  if (enUso.length) {
    const reassignEl = document.getElementById('cat-reassign-select');
    const target = reassignEl ? reassignEl.value : null;
    // Reasignar los objetos afectados a la categoría elegida, o dejar sin categoría si no hay otra disponible
    S.inv = S.inv.map(it => it.categoria === cat ? { ...it, categoria: target || '' } : it);
  }
  S.cats = S.cats.filter(c => c !== cat);
  S.catDeleteConfirm = null;
  addHistory('cat_eliminada', `Categoría eliminada: "${cat}"${enUso.length ? ` (${enUso.length} objeto(s) reasignado(s))` : ''}`, null);
  renderAdminPart();
  showToast(`Categoría "${cat}" eliminada`);
}

function fn_addFecha() {
  const fecha = document.getElementById('fecha-input')?.value;
  const h09   = document.getElementById('fecha-h09')?.checked;
  const h14   = document.getElementById('fecha-h14')?.checked;
  const cupoRaw = document.getElementById('fecha-cupo')?.value;
  const tipo  = S.fechaForm.tipo || 'personal';
  const errEl = document.getElementById('fecha-err');

  if (!fecha) { if(errEl){errEl.textContent='Seleccioná una fecha';errEl.style.display='block';} return; }
  if (!h09&&!h14) { if(errEl){errEl.textContent='Seleccioná al menos un horario';errEl.style.display='block';} return; }
  if (S.fechasDisp.some(d=>d.fecha===fecha)) { if(errEl){errEl.textContent='Esta fecha ya está cargada (recordá: cada fecha es exclusiva de un solo tipo de visita)';errEl.style.display='block';} return; }

  let cupo = parseInt(cupoRaw);
  if (!cupo || cupo < 1) cupo = MAX_PERSONAL_PER_FECHA; // default 32

  const horarios = [];
  if (h09) horarios.push('09:00');
  if (h14) horarios.push('14:00');
  const nueva = {id: Date.now(), fecha, tipo, horarios, cupo};
  S.fechasDisp = [...S.fechasDisp, nueva];
  S.fechaForm  = {fecha:'', h09:true, h14:true, cupo:32, tipo};
  render();
  const tipoLbl = {personal:'Personal',escolar:'Escolar',institucional:'Institucional'}[tipo];
  showToast(`Fecha ${fmtDate(fecha)} habilitada para visitas ${tipoLbl} (cupo: ${cupo})`);
}

function fn_xlsxLoad(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const wb = XLSX.read(e.target.result, {type:'array'});
      const ws = wb.Sheets[wb.SheetNames[0]];
      const data = XLSX.utils.sheet_to_json(ws, {defval:''});
      S.xlsxData = data;
      S.xlsxSel  = new Set(data.map((_,i)=>i)); // seleccionar todo por defecto
      render();
    } catch(err) {
      showToast('Error al leer el archivo');
    }
  };
  reader.readAsArrayBuffer(file);
}

function fn_xlsxImport() {
  const selected = S.xlsxData.filter((_,i) => S.xlsxSel.has(i));
  let nextId = S.inv.length ? Math.max(...S.inv.map(i=>i.id))+1 : 1;
  const nuevos = selected.map(row => ({
    id: nextId++,
    nombre:       String(row.nombre||row.Nombre||'Sin nombre'),
    codigo:       String(row.codigo||row.Código||`IMP-${nextId}`).toUpperCase(),
    codigoAntiguo:String(row.codigoAntiguo||'—'),
    codigoSigaf:  String(row.codigoSigaf||'—'),
    codigoFisico: String(row.codigoFisico||'—'),
    descripcion:  String(row.descripcion||''),
    autor:        String(row.autor||'—'),
    epoca:        String(row.epoca||'—'),
    categoria:    String(row.categoria||row.Categoría||'Instrumental'),
    coleccion:    String(row.coleccion||row.Colección||'Técnica'),
    material:     String(row.material||row.Material||'—'),
    dimensiones:  String(row.dimensiones||'—'),
    propiedad:    String(row.propiedad||'Propio'),
    donante:      String(row.donante||'—'),
    sala:         String(row.sala||'Planta Baja'),
    vitrina:      String(row.vitrina||'—'),
    estado:       String(row.estado||'Bueno'),
  }));
  S.inv = [...S.inv, ...nuevos];
  S.xlsxOpen = false; S.xlsxData = []; S.xlsxSel = new Set();
  // Un registro de historial POR OBJETO, con su nombre y enlace directo
  nuevos.forEach(obj => {
    addHistory('obj_importado', `Objeto importado: "${obj.nombre}" (${obj.codigo})`, obj.id);
  });
  render();
  showToast(`${nuevos.length} objeto${nuevos.length!==1?'s':''} importado${nuevos.length!==1?'s':''}`);
}

// ══════════════════════════════════════════════
//  HELPERS
// ══════════════════════════════════════════════
function escHtml(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function minDate() {
  const d = new Date();
  d.setDate(d.getDate()+1);
  return d.toISOString().split('T')[0];
}

function getFilteredInv() {
  const q = nrm(S.invQ);
  return S.inv.filter(it => {
    if (S.invSala && it.sala!==S.invSala) return false;
    if (S.invCat  && it.categoria!==S.invCat) return false;
    if (S.invCol  && it.coleccion!==S.invCol) return false;
    if (q && ![it.nombre,it.codigo,it.categoria,it.coleccion,it.sala,it.vitrina,it.autor||'',it.epoca||'',it.descripcion||''].some(v=>nrm(v).includes(q))) return false;
    return true;
  });
}

// Re-render parcial del contenido admin (sin re-crear navbar/sidebar)
function renderAdminPart() {
  const el = document.querySelector('.admin-content');
  if (!el) return;
  let content = '';
  if (S.adminTab==='dash')       content=renderDash();
  else if (S.adminTab==='rv')    content=renderAdminRv();
  else if (S.adminTab==='inv')   content=renderAdminInv();
  else if (S.adminTab==='fechas')content=renderFechas();
  else if (S.adminTab==='hist')  content=renderHistorial();
  el.innerHTML = content;
  attachEvents();
}

function renderModalPart(type) {
  if (type==='add') {
    const overlay = document.getElementById('add-modal-overlay');
    if (overlay && overlay.isConnected) {
      // Preservar el scroll interno del modal (tiene su propio overflow-y:auto),
      // porque outerHTML crea un nodo nuevo y por defecto arrancaría en 0.
      const prevScroll = overlay.querySelector('.modal')?.scrollTop || 0;
      overlay.outerHTML = renderAddObjModal();
      const newModal = document.querySelector('#add-modal-overlay .modal');
      if (newModal) newModal.scrollTop = prevScroll;
    }
    attachEvents();
  } else if (type==='edit') {
    const overlay = document.getElementById('edit-modal-overlay');
    if (overlay && overlay.isConnected && S.invModal) {
      const prevScroll = overlay.querySelector('.modal')?.scrollTop || 0;
      overlay.outerHTML = renderEditModal(S.invModal);
      const newModal = document.querySelector('#edit-modal-overlay .modal');
      if (newModal) newModal.scrollTop = prevScroll;
    }
    attachEvents();
  }
}

// Re-render parcial de la página pública de reservas (sin re-crear navbar),
// para no perder la posición de scroll al agregar/quitar integrantes ni al
// cambiar de fecha.
function renderReservasPart() {
  const el = document.querySelector('#app .page');
  // isConnected evita errores si dos eventos dispararon un re-render casi
  // simultáneo y este nodo ya fue reemplazado por el primero.
  if (!el || !el.isConnected) { return; }
  const prevScroll = window.scrollY;
  el.outerHTML = renderPage();
  attachEvents();
  window.scrollTo({top:prevScroll, behavior:'instant'});
}

// ══════════════════════════════════════════════
//  ROUTER
// ══════════════════════════════════════════════
window.addEventListener('hashchange', () => {
  S.route = window.location.hash.slice(1) || '/';
  S.rvOk = false;
  render();
});

// ══════════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════════
render();
</script>
